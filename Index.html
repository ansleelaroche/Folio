<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Smart</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #1c1917; color: #E7E5E4; min-height: 100vh; }
        .vines-svg { position: fixed; pointer-events: none; z-index: 0; opacity: 0.15; }
        .glass-card { background: rgba(41, 37, 36, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.03); }
        .glass-dock { background: rgba(28, 25, 23, 0.95); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="antialiased font-light uppercase tracking-tight">
    <svg class="vines-svg top-0 left-0 w-[300px] h-[300px]" viewBox="0 0 200 200">
        <path d="M0,0 Q50,20 80,80 T150,120" stroke="#4d7c0f" stroke-width="1.5" fill="none"/>
    </svg>
    
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        function PantryApp() {
            const rooms = ["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"];
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [editingId, setEditingId] = useState(null);

            useEffect(() => { 
                fetchItems(); 
            }, []);

            useEffect(() => { 
                if (window.lucide) window.lucide.createIcons(); 
            }, [items, activeRoom, editingId]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName) return;

                const name = newName.trim();
                const qtyStr = newQty || "1";
                
                const existing = items.find(i => 
                    i.room === activeRoom && i.name.toLowerCase() === name.toLowerCase()
                );

                if (existing) {
                    const combined = (parseFloat(existing.qty || 0) + parseFloat(qtyStr || 0)).toString();
                    const { data } = await supabase.from('FancyPantry').update({ qty: combined }).eq('id', existing.id).select();
                    if (data) setItems(items.map(i => i.id === existing.id ? data[0] : i));
                } else {
                    const { data } = await supabase.from('FancyPantry').insert([{ name, qty: qtyStr, room: activeRoom }]).select();
                    if (data) setItems([...items, data[0]]);
                }
                setNewName(""); setNewQty("");
            };

            const updateItem = async (id, field, value) => {
                setItems(items.map(i => i.id === id ? { ...i, [field]: value } : i));
                await supabase.from('FancyPantry').update({ [field]: value }).eq('id', id);
            };

            const removeItem = async (id) => {
                setItems(items.filter(i => i.id !== id));
                await supabase.from('FancyPantry').delete().eq('id', id);
            };

            const filtered = items.filter(i => i.room === activeRoom);

            return (
                <div className="max-w-4xl mx-auto pb-40 px-4 pt-10">
                    <header className="flex justify-between items-center mb-8 px-2">
                        <h1 className="text-3xl font-extralight italic">FancyPantry</h1>
                        <span className="text-stone-600 text-[10px] font-bold tracking-widest">{filtered.length} ITEMS</span>
                    </header>
                    
                    <nav className="flex gap-2 overflow-x-auto pb-4 mb-6 no-scrollbar border-b border-white/5">
                        {rooms.map(room => (
                            <button key={room} onClick={() => setActiveRoom(room)}
                                className={`px-5 py-2 rounded-xl text-[10px] font-bold transition-all whitespace-nowrap ${
                                    activeRoom === room ? "bg-white text-stone-900" : "bg-stone-900/40 text-stone-500"
                                }`}>
                                {room}
                            </button>
                        ))}
                    </nav>

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2">
                        {filtered.map(item => (
                            <div key={item.id} className="glass-card px-4 py-3 rounded-2xl flex justify-between items-center group">
                                <div className="flex-1 min-w-0 mr-2">
                                    {editingId === item.id ? (
                                        <input autoFocus className="text-xs font-medium text-white bg-transparent outline-none w-full border-b border-white/20"
                                            value={item.name}
                                            onChange={(e) => updateItem(item.id, 'name', e.target.value)}
                                            onBlur={() => setEditingId(null)}
                                        />
                                    ) : (
                                        <div onClick={() => setEditingId(item.id)} className="cursor-pointer">
                                            <p className="text-[11px] font-medium text-stone-200 truncate">{item.name}</p>
                                            <p className="text-[9px] text-stone-500 font-bold">QTY: {item.qty}</p>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => removeItem(item.id)} className="text-stone-700 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <i data-lucide="x" className="w-3 h-3"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-8 left-4 right-4 flex justify-center pointer-events-none">
                        <div className="glass-dock p-2 w-full max-w-lg pointer-events-auto rounded-2xl shadow-2xl">
                            <form onSubmit={handleAddItem} className="flex items-center gap-2">
                                <input type="text" placeholder={`${activeRoom}...`} 
                                    value={newName} onChange={(e) => setNewName(e.target.value)}
                                    className="flex-1 bg-transparent px-4 py-3 outline-none text-sm text-white placeholder:text-stone-700"
                                />
                                <input type="text" placeholder="Qty" 
                                    value={newQty} onChange={(e) => setNewQty(e.target.value)}
                                    className="w-16 bg-white/5 rounded-xl py-3 text-center outline-none text-xs font-bold text-stone-400"
                                />
                                <button type="submit" className="bg-white text-stone-900 w-10 h-10 rounded-xl flex items-center justify-center">
                                    <i data-lucide="plus" className="w-5 h-5"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
