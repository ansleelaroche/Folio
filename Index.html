<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Vector Botanical</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { 
            background-color: #1c1917; /* Original Cozy Dark */
            min-height: 100vh; 
            color: #E7E5E4; 
            overflow-x: hidden;
        }

        .vines-svg {
            position: fixed;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15; /* Subtle enough not to distract */
        }

        .glass-card {
            background: rgba(41, 37, 36, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .glass-dock {
            background: rgba(28, 25, 23, 0.85);
            backdrop-filter: blur(32px);
            -webkit-backdrop-filter: blur(32px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
    </style>
</head>
<body class="antialiased font-light">
    <svg class="vines-svg top-0 left-0 w-[300px] h-[300px] sm:w-[500px] sm:h-[500px]" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 Q50,20 80,80 T150,120 M10,0 Q30,60 100,70" stroke="#4d7c0f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M40,15 Q45,5 55,10 T40,15" fill="#4d7c0f" opacity="0.6"/>
        <path d="M75,55 Q85,45 95,55 T75,55" fill="#4d7c0f" opacity="0.6"/>
        <path d="M120,105 Q135,95 145,110 T120,105" fill="#4d7c0f" opacity="0.6"/>
        <path d="M25,40 Q15,35 10,45 T25,40" fill="#4d7c0f" opacity="0.6"/>
    </svg>

    <svg class="vines-svg bottom-0 right-0 w-[300px] h-[300px] sm:w-[500px] sm:h-[500px] rotate-180" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M0,0 Q50,20 80,80 T150,120 M10,0 Q30,60 100,70" stroke="#4d7c0f" stroke-width="1.5" fill="none" stroke-linecap="round"/>
        <path d="M40,15 Q45,5 55,10 T40,15" fill="#4d7c0f" opacity="0.6"/>
        <path d="M75,55 Q85,45 95,55 T75,55" fill="#4d7c0f" opacity="0.6"/>
        <path d="M120,105 Q135,95 145,110 T120,105" fill="#4d7c0f" opacity="0.6"/>
    </svg>
    
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        function PantryApp() {
            const rooms = [
                { name: "Fridge", icon: "refrigerator" },
                { name: "Freezer", icon: "snowflake" },
                { name: "Pantry", icon: "box" },
                { name: "Counter", icon: "utensils" },
                { name: "Cabinets", icon: "archive" }
            ];

            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [editingId, setEditingId] = useState(null);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { lucide.createIcons(); }, [items, activeRoom, editingId]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('created_at', { ascending: false });
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName) return;
                const newItem = { name: newName, qty: newQty || "1", room: activeRoom };
                const { data } = await supabase.from('FancyPantry').insert([newItem]).select();
                if (data) {
                    setItems([data[0], ...items]);
                    setNewName("");
                    setNewQty("");
                }
            };

            const updateItem = async (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                await supabase.from('FancyPantry').update({ [field]: value }).eq('id', id);
            };

            const removeItem = async (id) => {
                setItems(items.filter(item => item.id !== id));
                await supabase.from('FancyPantry').delete().eq('id', id);
            };

            const filteredItems = items.filter(item => item.room === activeRoom);

            return (
                <div className="max-w-6xl mx-auto min-h-screen pb-48 px-6 pt-16">
                    <header className="flex justify-between items-end mb-16">
                        <div>
                            <h1 className="text-5xl font-extralight tracking-tighter text-white uppercase italic leading-none">FancyPantry</h1>
                            <p className="text-stone-500 text-[11px] tracking-[0.5em] font-bold mt-4 uppercase">Vector Botanical</p>
                        </div>
                        <div className="hidden sm:block">
                            <span className="text-stone-700 text-3xl font-extralight italic">{items.length} units</span>
                        </div>
                    </header>
                    
                    <nav className="flex gap-4 overflow-x-auto pb-8 mb-12 no-scrollbar border-b border-white/5">
                        {rooms.map(room => (
                            <button 
                                key={room.name} 
                                onClick={() => {setActiveRoom(room.name); setEditingId(null);}}
                                className={`flex items-center gap-3 px-8 py-3 rounded-2xl border transition-all whitespace-nowrap ${
                                    activeRoom === room.name 
                                    ? "bg-white text-stone-900 border-white shadow-xl scale-105" 
                                    : "bg-stone-900/40 text-stone-500 border-white/5 hover:border-white/20 hover:text-stone-300"
                                }`}
                            >
                                <i data-lucide={room.icon} className="w-4 h-4"></i>
                                <span className="text-xs font-bold uppercase tracking-widest">{room.name}</span>
                            </button>
                        ))}
                    </nav>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        {filteredItems.map(item => (
                            <div key={item.id} className="glass-card px-8 py-7 rounded-[2.8rem] flex justify-between items-center group transition-all duration-300">
                                <div className="flex-1 mr-4">
                                    {editingId === item.id ? (
                                        <div className="flex flex-col gap-1">
                                            <input autoFocus className="text-sm font-medium text-white bg-transparent outline-none border-b border-white/20"
                                                value={item.name}
                                                onChange={(e) => updateItem(item.id, 'name', e.target.value)}
                                                onBlur={() => setEditingId(null)}
                                                onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)}
                                            />
                                            <input className="text-[10px] font-bold text-stone-500 bg-transparent outline-none w-16"
                                                value={item.qty}
                                                onChange={(e) => updateItem(item.id, 'qty', e.target.value)}
                                                onBlur={() => setEditingId(null)}
                                                onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)}
                                            />
                                        </div>
                                    ) : (
                                        <div onClick={() => setEditingId(item.id)} className="cursor-pointer">
                                            <p className="text-base font-medium text-stone-200 uppercase tracking-tight group-hover:text-white transition-colors">{item.name}</p>
                                            <p className="text-[10px] text-stone-500 font-bold mt-2 uppercase tracking-widest">Qty: {item.qty}</p>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => removeItem(item.id)} className="text-stone-800 hover:text-red-900/50 p-2 transition-all opacity-0 group-hover:opacity-100">
                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-12 left-6 right-6 flex justify-center pointer-events-none">
                        <div className="glass-dock shadow-2xl rounded-[3rem] p-2.5 w-full max-w-2xl pointer-events-auto">
                            <form onSubmit={handleAddItem} className="flex items-center gap-3">
                                <input type="text" placeholder={`Add to ${activeRoom.toLowerCase()}...`} 
                                    value={newName} onChange={(e) => setNewName(e.target.value)}
                                    className="flex-1 bg-transparent border-none px-8 py-4 outline-none text-[17px] text-white placeholder:text-stone-700"
                                />
                                <input type="text" placeholder="Qty" 
                                    value={newQty} onChange={(e) => setNewQty(e.target.value)}
                                    className="w-24 bg-white/5 border border-white/10 rounded-[1.8rem] py-4 text-center outline-none text-[14px] font-bold text-stone-500"
                                />
                                <button type="submit" className="bg-white text-stone-900 w-14 h-14 rounded-[2rem] flex items-center justify-center shadow-xl active:scale-95 transition-transform">
                                    <i data-lucide="plus" className="w-7 h-7"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
