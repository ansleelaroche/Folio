<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Botanical HD</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        body { 
            background-color: #121110; 
            min-height: 100vh; 
            color: #E7E5E4; 
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at center, transparent 0%, #121110 90%),
                url('https://images.unsplash.com/photo-1525498128493-380d1990a112?auto=format&fit=crop&q=20&w=1000');
            background-attachment: fixed;
            background-size: cover;
        }

        /* The Corner Vines */
        .vines-top {
            position: fixed;
            top: -50px;
            left: -50px;
            width: 400px;
            height: 400px;
            background-image: url('https://images.unsplash.com/photo-1533038590840-1cde6e668a91?auto=format&fit=crop&q=60&w=500');
            background-size: contain;
            background-no-repeat: no-repeat;
            opacity: 0.25;
            filter: grayscale(40%) contrast(120%);
            pointer-events: none;
            z-index: 0;
            transform: rotate(-15deg);
        }

        .vines-bottom {
            position: fixed;
            bottom: -80px;
            right: -80px;
            width: 500px;
            height: 500px;
            background-image: url('https://images.unsplash.com/photo-1501004318641-729e75164754?auto=format&fit=crop&q=60&w=500');
            background-size: contain;
            background-no-repeat: no-repeat;
            opacity: 0.2;
            filter: grayscale(30%) brightness(0.7);
            pointer-events: none;
            z-index: 0;
        }

        .glass-card {
            background: rgba(28, 25, 23, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .glass-dock {
            background: rgba(28, 25, 23, 0.8);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="antialiased font-light">
    <div class="vines-top"></div>
    <div class="vines-bottom"></div>
    
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        function PantryApp() {
            const rooms = [
                { name: "Fridge", icon: "refrigerator" },
                { name: "Freezer", icon: "snowflake" },
                { name: "Pantry", icon: "box" },
                { name: "Counter", icon: "utensils" },
                { name: "Cabinets", icon: "archive" }
            ];

            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [editingId, setEditingId] = useState(null);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { lucide.createIcons(); }, [items, activeRoom, editingId]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('created_at', { ascending: false });
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName) return;
                const newItem = { name: newName, qty: newQty || "1", room: activeRoom };
                const { data } = await supabase.from('FancyPantry').insert([newItem]).select();
                if (data) {
                    setItems([data[0], ...items]);
                    setNewName("");
                    setNewQty("");
                }
            };

            const updateItem = async (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                await supabase.from('FancyPantry').update({ [field]: value }).eq('id', id);
            };

            const removeItem = async (id) => {
                setItems(items.filter(item => item.id !== id));
                await supabase.from('FancyPantry').delete().eq('id', id);
            };

            const filteredItems = items.filter(item => item.room === activeRoom);

            return (
                <div className="max-w-5xl mx-auto min-h-screen pb-48 px-6 pt-16">
                    <header className="flex justify-between items-end mb-12">
                        <div>
                            <h1 className="text-5xl font-extralight tracking-tighter text-stone-100 uppercase italic leading-none">FancyPantry</h1>
                            <p className="text-stone-500 text-[10px] tracking-[0.5em] font-bold mt-3 uppercase">Managed Atmosphere</p>
                        </div>
                        <div className="text-stone-700 font-serif italic text-2xl hidden sm:block">
                            {items.length} items in stock
                        </div>
                    </header>
                    
                    <nav className="flex gap-4 overflow-x-auto pb-6 mb-10 no-scrollbar border-b border-stone-800/30">
                        {rooms.map(room => (
                            <button 
                                key={room.name} 
                                onClick={() => {setActiveRoom(room.name); setEditingId(null);}}
                                className={`flex items-center gap-3 px-8 py-3 rounded-2xl border transition-all whitespace-nowrap ${
                                    activeRoom === room.name 
                                    ? "bg-stone-100 text-stone-900 border-stone-100 shadow-[0_0_30px_rgba(255,255,255,0.1)] scale-105" 
                                    : "bg-stone-900/20 text-stone-500 border-stone-800 hover:border-stone-600 hover:text-stone-300"
                                }`}
                            >
                                <i data-lucide={room.icon} className="w-4 h-4"></i>
                                <span className="text-[11px] font-bold uppercase tracking-widest">{room.name}</span>
                            </button>
                        ))}
                    </nav>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5">
                        {filteredItems.map(item => (
                            <div key={item.id} className="glass-card px-7 py-6 rounded-[2.5rem] flex justify-between items-center group hover:border-stone-700 transition-all duration-500">
                                <div className="flex-1 mr-4">
                                    {editingId === item.id ? (
                                        <div className="flex flex-col gap-2">
                                            <input autoFocus className="text-sm font-medium text-stone-100 bg-stone-800/50 rounded-lg px-2 py-1 outline-none border-b border-stone-500"
                                                value={item.name}
                                                onChange={(e) => updateItem(item.id, 'name', e.target.value)}
                                                onBlur={() => setEditingId(null)}
                                                onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)}
                                            />
                                            <input className="text-[10px] font-bold text-stone-400 bg-stone-800/50 rounded-lg px-2 outline-none w-16"
                                                value={item.qty}
                                                onChange={(e) => updateItem(item.id, 'qty', e.target.value)}
                                                onBlur={() => setEditingId(null)}
                                                onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)}
                                            />
                                        </div>
                                    ) : (
                                        <div onClick={() => setEditingId(item.id)} className="cursor-pointer">
                                            <p className="text-base font-medium text-stone-200 group-hover:text-white transition-colors uppercase tracking-tight">{item.name}</p>
                                            <p className="text-[11px] text-stone-500 font-bold mt-2 uppercase tracking-[0.2em]">Stocked: {item.qty}</p>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => removeItem(item.id)} className="text-stone-800 hover:text-red-900/50 p-2 transition-all opacity-40 group-hover:opacity-100">
                                    <i data-lucide="trash-2" className="w-4 h-4"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-12 left-6 right-6 flex justify-center pointer-events-none">
                        <div className="glass-dock shadow-2xl rounded-[3rem] p-2.5 w-full max-w-2xl pointer-events-auto">
                            <form onSubmit={handleAddItem} className="flex items-center gap-3">
                                <input type="text" placeholder={`Replenish ${activeRoom.toLowerCase()}...`} 
                                    value={newName} onChange={(e) => setNewName(e.target.value)}
                                    className="flex-1 bg-transparent border-none px-8 py-4 outline-none text-[17px] text-stone-100 placeholder:text-stone-800"
                                />
                                <input type="text" placeholder="Vol" 
                                    value={newQty} onChange={(e) => setNewQty(e.target.value)}
                                    className="w-24 bg-stone-100/5 border border-stone-800 rounded-[1.8rem] py-4 text-center outline-none text-[14px] font-bold text-stone-600"
                                />
                                <button type="submit" className="bg-stone-100 text-stone-900 w-14 h-14 rounded-[2rem] flex items-center justify-center shadow-xl active:scale-90 transition-all">
                                    <i data-lucide="plus" className="w-7 h-7"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
