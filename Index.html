<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitchen Inventory</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F9F8F6] text-stone-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function PantryApp() {
            const rooms = ["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"];
            const [activeRoom, setActiveRoom] = useState("Fridge");
            
            // NEW: Load items from LocalStorage when the app starts
            const [items, setItems] = useState(() => {
                const saved = localStorage.getItem("pantry_data");
                return saved ? JSON.parse(saved) : [
                    { id: 1, name: "Organic Milk", qty: "1", room: "Fridge" }
                ];
            });

            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState(""); // State for Quantity

            // NEW: Save items to LocalStorage whenever the list changes
            useEffect(() => {
                localStorage.setItem("pantry_data", JSON.stringify(items));
            }, [items]);

            const handleAddItem = (e) => {
                e.preventDefault();
                if (!newName) return;
                const newItem = {
                    id: Date.now(),
                    name: newName,
                    qty: newQty || "1",
                    room: activeRoom
                };
                setItems([newItem, ...items]);
                setNewName("");
                setNewQty("");
            };

            const removeItem = (id) => {
                setItems(items.filter(item => item.id !== id));
            };

            const filteredItems = items.filter(item => item.room === activeRoom);

            return (
                <div class="max-w-md mx-auto min-h-screen pb-40 p-6">
                    <header class="mb-8 pt-6">
                        <h1 class="text-3xl font-extralight tracking-tight text-stone-900 italic">Kitchen Inventory</h1>
                        <p class="text-stone-400 text-sm mt-1 uppercase tracking-widest">{activeRoom}</p>
                    </header>
                    
                    <div class="flex gap-2 overflow-x-auto pb-4 mb-6 no-scrollbar">
                        {rooms.map(room => (
                            <button key={room} onClick={() => setActiveRoom(room)}
                                class={`px-5 py-2 rounded-xl text-xs font-bold transition-all whitespace-nowrap border ${
                                    activeRoom === room ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-400 border-stone-200"
                                }`}>
                                {room.toUpperCase()}
                            </button>
                        ))}
                    </div>

                    <div class="space-y-2">
                        {filteredItems.length > 0 ? (
                            filteredItems.map(item => (
                                <div key={item.id} class="bg-white p-4 rounded-xl border border-stone-100 flex justify-between items-center shadow-sm">
                                    <div class="flex flex-col">
                                        <span class="font-medium text-stone-800">{item.name}</span>
                                        <span class="text-[10px] text-stone-400 uppercase font-bold tracking-tighter">Qty: {item.qty}</span>
                                    </div>
                                    <button onClick={() => removeItem(item.id)} class="text-stone-300 hover:text-red-400 text-xl">×</button>
                                </div>
                            ))
                        ) : (
                            <div class="py-20 text-center border border-dashed border-stone-200 rounded-2xl">
                                <p class="text-stone-300 text-sm italic">Nothing in {activeRoom}</p>
                            </div>
                        )}
                    </div>

                    {/* UPDATED: Dual Input Bar */}
                    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-md border-t border-stone-100 p-6">
                        <form onSubmit={handleAddItem} class="max-w-md mx-auto flex flex-col gap-3">
                            <div class="flex gap-2">
                                <input type="text" placeholder="Item name..." value={newName}
                                    onChange={(e) => setNewName(e.target.value)}
                                    class="flex-1 bg-stone-50 border border-stone-100 rounded-xl p-3 outline-none focus:bg-white focus:border-stone-300 transition-all"
                                />
                                <input type="text" placeholder="Qty" value={newQty}
                                    onChange={(e) => setNewQty(e.target.value)}
                                    class="w-16 bg-stone-50 border border-stone-100 rounded-xl p-3 text-center outline-none"
                                />
                            </div>
                            <button type="submit" class="bg-stone-900 text-white py-3 rounded-xl font-bold active:scale-95 transition-all">
                                ADD TO {activeRoom.toUpperCase()}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
