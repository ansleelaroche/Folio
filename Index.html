<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kitchen Cloud</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { overflow-x: hidden; position: fixed; width: 100%; height: 100%; }
        #root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-[#FAF9F6] text-stone-800 antialiased font-light">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- PASTE YOUR KEYS HERE ---
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        function PantryApp() {
            const rooms = [
                { name: "Fridge", icon: "refrigerator" },
                { name: "Freezer", icon: "snowflake" },
                { name: "Pantry", icon: "box" },
                { name: "Counter", icon: "utensils" },
                { name: "Cabinets", icon: "archive" }
            ];

            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [editingId, setEditingId] = useState(null);

            useEffect(() => {
                fetchItems();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [items, activeRoom, editingId]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('created_at', { ascending: false });
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName) return;
                const newItem = { name: newName, qty: newQty || "1", room: activeRoom };
                const { data } = await supabase.from('FancyPantry').insert([newItem]).select();
                if (data) {
                    setItems([data[0], ...items]);
                    setNewName("");
                    setNewQty("");
                }
            };

            const updateItem = async (id, field, value) => {
                // Optimistic UI update (shows change instantly)
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                // Database update
                await supabase.from('FancyPantry').update({ [field]: value }).eq('id', id);
            };

            const removeItem = async (id) => {
                setItems(items.filter(item => item.id !== id));
                await supabase.from('FancyPantry').delete().eq('id', id);
            };

            const filteredItems = items.filter(item => item.room === activeRoom);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-40 px-5 pt-8">
                    <header className="flex justify-between items-center mb-6">
                        <h1 className="text-2xl font-extralight tracking-tighter text-stone-900 uppercase italic">Cloud Pantry</h1>
                        <span className="text-[10px] font-bold text-stone-300 tracking-widest">{items.length} TOTAL</span>
                    </header>
                    
                    <nav className="flex gap-2 overflow-x-auto pb-4 mb-4 no-scrollbar border-b border-stone-100">
                        {rooms.map(room => (
                            <button key={room.name} onClick={() => {setActiveRoom(room.name); setEditingId(null);}}
                                className={`flex items-center gap-2 px-3 py-1.5 rounded-full border transition-all ${
                                    activeRoom === room.name ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-400 border-stone-100"
                                }`}>
                                <i data-lucide={room.icon} className="w-3.5 h-3.5 stroke-[1.5px]"></i>
                                <span className="text-[10px] font-bold uppercase tracking-wider">{room.name}</span>
                            </button>
                        ))}
                    </nav>

                    <div className="space-y-1.5">
                        {filteredItems.map(item => (
                            <div key={item.id} className="bg-white px-4 py-3 rounded-2xl border border-stone-50 flex justify-between items-center shadow-sm">
                                <div className="flex-1 mr-4">
                                    {editingId === item.id ? (
                                        <div className="flex flex-col gap-1">
                                            <input autoFocus className="text-sm font-medium text-stone-800 bg-stone-50 rounded px-1 outline-none border-b border-stone-200"
                                                value={item.name}
                                                onChange={(e) => updateItem(item.id, 'name', e.target.value)}
                                                onBlur={() => setEditingId(null)}
                                                onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)}
                                            />
                                            <input className="text-[10px] font-bold text-stone-500 bg-stone-50 rounded px-1 outline-none w-20"
                                                value={item.qty}
                                                onChange={(e) => updateItem(item.id, 'qty', e.target.value)}
                                                onBlur={() => setEditingId(null)}
                                                onKeyDown={(e) => e.key === 'Enter' && setEditingId(null)}
                                            />
                                        </div>
                                    ) : (
                                        <div onClick={() => setEditingId(item.id)} className="cursor-pointer">
                                            <p className="text-sm font-medium text-stone-700 leading-none">{item.name}</p>
                                            <p className="text-[9px] text-stone-400 font-bold mt-1 uppercase">Qty: {item.qty}</p>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => removeItem(item.id)} className="text-stone-200 hover:text-red-300 p-1">
                                    <i data-lucide="trash-2" className="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-8 left-5 right-5 bg-white/90 backdrop-blur-2xl border border-white shadow-xl rounded-3xl p-2 max-w-md mx-auto">
                        <form onSubmit={handleAddItem} className="flex items-center gap-1">
                            <input type="text" placeholder={`New in ${activeRoom.toLowerCase()}...`} 
                                value={newName} onChange={(e) => setNewName(e.target.value)}
                                className="flex-1 bg-transparent border-none px-4 py-2 outline-none text-[16px] text-stone-800"
                            />
                            <input type="text" placeholder="Qty" 
                                value={newQty} onChange={(e) => setNewQty(e.target.value)}
                                className="w-14 bg-stone-50 border-none rounded-xl py-2 text-center outline-none text-[16px] font-bold text-stone-500"
                            />
                            <button type="submit" className="bg-stone-900 text-white w-10 h-10 rounded-2xl flex items-center justify-center">
                                <i data-lucide="plus" className="w-5 h-5"></i>
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
