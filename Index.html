<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Kitchen Cloud</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { overflow-x: hidden; position: fixed; width: 100%; height: 100%; }
        #root { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    </style>
</head>
<body class="bg-[#FAF9F6] text-stone-800 antialiased font-light">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Initialize Supabase using the "Secret Keys" from Netlify
        // Note: These variables will be 'undefined' until deployed on Netlify
        const supabaseUrl = window.location.hostname === 'localhost' ? '' : 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = window.location.hostname === 'localhost' ? '' : 'jqvuqfqedzlegxuvudag';
        
        // FOR NOW: To make it work instantly without complex build steps, 
        // paste your actual URL and KEY into the strings below.
        const supabase = supabase.createClient(
            'https://jqvuqfqedzlegxuvudag.supabase.co', 
            'jqvuqfqedzlegxuvudag'
        );

        function PantryApp() {
            const rooms = [
                { name: "Fridge", icon: "refrigerator" },
                { name: "Freezer", icon: "snowflake" },
                { name: "Pantry", icon: "box" },
                { name: "Counter", icon: "utensils" },
                { name: "Cabinets", icon: "archive" }
            ];

            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [editingId, setEditingId] = useState(null);

            // FETCH DATA FROM DATABASE
            useEffect(() => {
                fetchItems();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [items, activeRoom, editingId]);

            async function fetchItems() {
                const { data } = await supabase.from('pantry_items').select('*').order('created_at', { ascending: false });
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName) return;
                
                const newItem = { name: newName, qty: newQty || "1", room: activeRoom };
                const { data, error } = await supabase.from('pantry_items').insert([newItem]).select();
                
                if (data) {
                    setItems([data[0], ...items]);
                    setNewName("");
                    setNewQty("");
                }
            };

            const updateItem = async (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                await supabase.from('pantry_items').update({ [field]: value }).eq('id', id);
            };

            const removeItem = async (id) => {
                setItems(items.filter(item => item.id !== id));
                await supabase.from('pantry_items').delete().eq('id', id);
            };

            const filteredItems = items.filter(item => item.room === activeRoom);

            return (
                <div class="max-w-md mx-auto min-h-screen pb-40 px-5 pt-8">
                    <header class="flex justify-between items-center mb-6">
                        <h1 class="text-2xl font-extralight tracking-tighter text-stone-900 uppercase italic">Cloud Pantry</h1>
                        <span class="text-[10px] font-bold text-stone-300 tracking-widest">{items.length} ITEMS</span>
                    </header>
                    
                    <nav class="flex gap-2 overflow-x-auto pb-4 mb-4 no-scrollbar border-b border-stone-100">
                        {rooms.map(room => (
                            <button key={room.name} onClick={() => {setActiveRoom(room.name); setEditingId(null);}}
                                class={`flex items-center gap-2 px-3 py-1.5 rounded-full border transition-all ${
                                    activeRoom === room.name ? "bg-stone-900 text-white border-stone-900" : "bg-white text-stone-400 border-stone-100"
                                }`}>
                                <i data-lucide={room.icon} class="w-3.5 h-3.5 stroke-[1.5px]"></i>
                                <span class="text-[10px] font-bold uppercase tracking-wider">{room.name}</span>
                            </button>
                        ))}
                    </nav>

                    <div class="space-y-1.5">
                        {filteredItems.map(item => (
                            <div key={item.id} class="bg-white px-4 py-3 rounded-2xl border border-stone-50 flex justify-between items-center shadow-sm">
                                <div class="flex-1 mr-4">
                                    {editingId === item.id ? (
                                        <input autoFocus class="text-sm font-medium text-stone-800 bg-stone-50 rounded px-1 outline-none w-full"
                                            value={item.name}
                                            onChange={(e) => updateItem(item.id, 'name', e.target.value)}
                                            onBlur={() => setEditingId(null)}
                                        />
                                    ) : (
                                        <div onClick={() => setEditingId(item.id)}>
                                            <p class="text-sm font-medium text-stone-700 leading-none">{item.name}</p>
                                            <p class="text-[9px] text-stone-400 font-bold mt-1 uppercase">Qty: {item.qty}</p>
                                        </div>
                                    )}
                                </div>
                                <button onClick={() => removeItem(item.id)} class="text-stone-200 hover:text-red-300 p-1">
                                    <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    <div class="fixed bottom-8 left-5 right-5 bg-white/90 backdrop-blur-2xl border border-white shadow-xl rounded-3xl p-2 max-w-md mx-auto">
                        <form onSubmit={handleAddItem} class="flex items-center gap-1">
                            <input type="text" placeholder={`Add to ${activeRoom.toLowerCase()}...`} 
                                value={newName} onChange={(e) => setNewName(e.target.value)}
                                class="flex-1 bg-transparent border-none px-4 py-2 outline-none text-[16px]"
                            />
                            <button type="submit" class="bg-stone-900 text-white w-10 h-10 rounded-2xl flex items-center justify-center">
                                <i data-lucide="plus" class="w-5 h-5"></i>
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
