<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FancyPantry Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Inter:wght@400;700;900&display=swap');
        
        html, body { 
            background-color: #0d0d0c; 
            color: #f4f4f5; 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0;
            width: 100%; overflow-x: hidden;
            -webkit-text-size-adjust: 100%;
            touch-action: manipulation;
        }

        body { -webkit-tap-highlight-color: transparent; min-height: 100vh; }
        .botanical-art { position: fixed; bottom: -2%; right: -2%; width: 180px; opacity: 0.08; pointer-events: none; filter: invert(1); z-index: 0; }
        
        .flex-container { display: flex; flex-wrap: wrap; gap: 1.5rem; position: relative; z-index: 1; }
        .column { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 1.5rem; }

        /* MOBILE STYLES (Default) */
        .handwritten { 
            font-family: 'Covered By Your Grace', cursive; 
            font-size: 1.4rem; 
            line-height: 1.2; 
            color: #ffffff; 
        }

        .note-box { background: #141413; border: 1px solid #3f3f46; padding: 16px; position: relative; height: auto; }
        
        .handwritten-header { 
            font-family: 'Covered By Your Grace', cursive; 
            font-size: 1.25rem; 
            letter-spacing: 0.1em; 
            text-transform: uppercase;
            border-bottom: 2px solid currentColor;
            padding-bottom: 2px;
            display: inline-block;
            margin-bottom: 8px;
            opacity: 1 !important;
        }
        
        .room-Fridge .handwritten-header { color: #7dd3fc; } 
        .room-Freezer .handwritten-header { color: #e2e8f0; } 
        .room-DryGoods .handwritten-header { color: #4ade80; }
        .room-ShoppingList .handwritten-header { color: #d8b4fe; }

        nav.room-nav {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 16px;
            position: sticky; top: 0; background: #0d0d0c; z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .room-btn { 
            transition: all 0.2s; font-size: 13px; font-weight: 800; 
            color: #a1a1aa !important; background: rgba(255,255,255,0.05); 
            padding: 10px 16px; border-radius: 9999px; border: 1px solid transparent;
            display: flex; align-items: center; gap: 8px;
        }

        .room-btn.active { color: #ffffff !important; background: rgba(255,255,255,0.2); border: 1px solid #ffffff; }
        
        .qty-text { color: #ffffff; font-weight: 900; }
        .out-of-stock-text { color: #fb7185; } 
        
        /* DESKTOP STYLES (Responsive Override) */
        @media (min-width: 768px) {
            .handwritten { font-size: 0.95rem; line-height: 1; }
            .handwritten-header { font-size: 0.85rem; margin-bottom: 4px; }
            .note-box { padding: 8px; }
            .flex-container { gap: 1rem; }
            .qty-text { margin-top: -1px !important; } /* Nudge quantity up to match baseline */
            
            /* Tighter List Spacing */
            .space-y-6 > :not([hidden]) ~ :not([hidden]) {
                margin-top: 0.45rem !important;
                margin-bottom: 0px !important;
            }
            ul.space-y-6 { margin-top: 0.5rem !important; }
        }

        .edit-popup {
            position: absolute; top: -10px; left: -10px; right: -10px; z-index: 50;
            background: #1c1c1b; border: 2px solid #52525b; padding: 16px; border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        input.edit-input { 
            background: #000; border: 1px solid #71717a; color: #fff; 
            padding: 12px; border-radius: 6px; font-size: 16px !important; width: 100%;
        }

        .stepper-btn {
            background: #52525b; color: white; border-radius: 6px;
            width: 48px; height: 48px; display: flex; align-items: center; justify-content: center;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased">
    <svg class="botanical-art" viewBox="0 0 100 100"><path d="M10,90 Q30,70 20,40 T50,20 T90,10" stroke="white" fill="none" stroke-width="0.3"/></svg>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const ROOM_ICONS = { "Fridge": "refrigerator", "Freezer": "snowflake", "Dry Goods": "layout-dashboard", "Shopping List": "shopping-cart" };
    const CATEGORIES = {
        "Produce": ["leaf", ["Fridge", "Dry Goods"]], "Dairy": ["milk", ["Fridge"]], "Protein": ["bone", ["Fridge", "Freezer"]],
        "Drinks": ["droplets", ["Fridge", "Dry Goods"]], "Condiments": ["utensils", ["Fridge", "Dry Goods"]],
        "Meats & Seafood": ["anchor", ["Freezer"]], "Prepared Meals": ["box", ["Freezer"]], "Frozen Veg & Fruit": ["leaf", ["Freezer"]],
        "Desserts": ["ice-cream", ["Freezer"]], "Bakery & Breads": ["wheat", ["Dry Goods"]], "Snacks": ["zap", ["Dry Goods"]],
        "Pasta & Grains": ["shrub", ["Dry Goods"]], "Cereal": ["box-select", ["Dry Goods"]], "Cans & Jars": ["container", ["Dry Goods"]],
        "Baking Essentials": ["cookie", ["Dry Goods"]], "Spreads & Jars": ["cup-soda", ["Dry Goods"]], "Sides": ["list-todo", ["Dry Goods"]],
        "Supplies": ["cog", ["Dry Goods"]], "Dishware": ["utensils-2", ["Dry Goods"]], "Misc": ["more-horizontal", ["Fridge", "Freezer", "Dry Goods"]]
    };

    const titleCase = (str) => str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    const isDogFood = (name) => ["ground turkey", "veggies", "berries", "kidney beans", "white rice", "sweet potato"].some(k => name.toLowerCase().includes(k));

    function PantryApp() {
        const [activeRoom, setActiveRoom] = useState("Fridge");
        const [items, setItems] = useState([]);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [editingId, setEditingId] = useState(null);
        const [editValue, setEditValue] = useState("");
        const [editQty, setEditQty] = useState("");
        const [modalCat, setModalCat] = useState("Misc");
        const [newName, setNewName] = useState("");
        const [newQty, setNewQty] = useState("");

        useEffect(() => { fetchItems(); }, []);
        useEffect(() => { setEditingId(null); window.scrollTo(0,0); }, [activeRoom]);
        useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, editingId, isModalOpen]);

        async function fetchItems() {
            const { data } = await supabase.from('FancyPantry').select('*').order('name');
            if (data) setItems(data);
        }

        const handleUpdate = async (id) => {
            await supabase.from('FancyPantry').update({ name: titleCase(editValue), qty: editQty }).eq('id', id);
            setEditingId(null);
            fetchItems();
        };

        const removeItem = async (id) => {
            if(confirm("Remove this item?")) {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            }
        };

        const grouped = useMemo(() => {
            const target = activeRoom.toLowerCase().replace(/\s/g, '');
            let filtered = items.filter(i => {
                const dbRoom = (i.room || "").toLowerCase().replace(/\s/g, '');
                if (target === "shoppinglist") return parseFloat(i.qty || 0) === 0;
                if (target === "drygoods") return ["drygoods", "pantry", "counter", "cabinets"].includes(dbRoom);
                return dbRoom === target;
            });

            return [...filtered].sort((a, b) => {
                const aQty = parseFloat(a.qty || 0), bQty = parseFloat(b.qty || 0);
                if (aQty === 0 && bQty > 0) return 1;
                if (aQty > 0 && bQty === 0) return -1;
                if (aQty > 0 && bQty > 0) {
                    if (isDogFood(a.name) && !isDogFood(b.name)) return -1;
                    if (!isDogFood(a.name) && isDogFood(b.name)) return 1;
                }
                return a.name.localeCompare(b.name);
            }).reduce((acc, i) => {
                const dbCat = (i.category || "Misc").toLowerCase().trim();
                const matchedKey = Object.keys(CATEGORIES).find(k => k.toLowerCase() === dbCat) || "Misc";
                if (!acc[matchedKey]) acc[matchedKey] = [];
                acc[matchedKey].push(i);
                return acc;
            }, {});
        }, [items, activeRoom]);

        const columnedCategories = useMemo(() => {
            const cols = [[], [], []], h = [0, 0, 0];
            Object.keys(CATEGORIES).filter(cat => grouped[cat])
                .sort((a, b) => grouped[b].length - grouped[a].length)
                .forEach(cat => {
                    const idx = h.indexOf(Math.min(...h));
                    cols[idx].push(cat);
                    h[idx] += (grouped[cat].length + 5);
                });
            return cols;
        }, [grouped]);

        const renderBox = (cat) => (
            <div key={cat} className="note-box">
                <div className="flex items-center gap-2 mb-6 opacity-90">
                    <i data-lucide={CATEGORIES[cat]?.[0] || 'dot'} className="w-4 h-4 text-white"></i>
                    <h3 className="handwritten-header">{cat}</h3>
                </div>
                <ul className="space-y-6">
                    {grouped[cat].map(item => (
                        <li key={item.id} className="relative">
                            {/* Changed items-start to items-baseline for alignment fix */}
                            <div className={`flex justify-between items-baseline ${parseFloat(item.qty) === 0 && activeRoom !== "Shopping List" ? 'out-of-stock-text' : ''}`} onClick={() => { setEditingId(item.id); setEditValue(item.name); setEditQty(item.qty); }}>
                                <div className="flex items-baseline gap-2 flex-1 cursor-pointer">
                                    <span className="handwritten whitespace-normal break-words capitalize leading-tight">{titleCase(item.name)}</span>
                                    {isDogFood(item.name) && <i data-lucide="paw-print" className="w-4 h-4 text-amber-200/40 shrink-0"></i>}
                                </div>
                                <div className="ml-2">
                                    <span className="text-[12px] font-black qty-text">x{item.qty}</span>
                                </div>
                            </div>

                            {editingId === item.id && (
                                <div className="edit-popup">
                                    <input className="edit-input handwritten text-xl mb-4" value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus />
                                    <div className="flex justify-between items-center">
                                        <div className="flex items-center gap-3">
                                            <button onClick={() => setEditQty(Math.max(0, parseFloat(editQty||0)-1))} className="stepper-btn"><i data-lucide="minus"></i></button>
                                            <input type="number" className="edit-input w-16 text-center font-bold" value={editQty} onChange={e => setEditQty(e.target.value)} />
                                            <button onClick={() => setEditQty(parseFloat(editQty||0)+1)} className="stepper-btn"><i data-lucide="plus"></i></button>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => removeItem(item.id)} className="text-red-800 text-[10px] font-bold uppercase px-2">Delete</button>
                                            <button onClick={() => handleUpdate(item.id)} className="bg-white text-black px-6 py-2 rounded-lg font-black text-[10px] uppercase tracking-tighter">Done</button>
                                        </div>
                                    </div>
                                    <button onClick={() => setEditingId(null)} className="w-full mt-4 text-[9px] text-stone-500 uppercase font-bold tracking-widest">Cancel</button>
                                </div>
                            )}
                        </li>
                    ))}
                </ul>
            </div>
        );

        return (
            <div className={`max-w-7xl mx-auto pb-40 room-${activeRoom.replace(/\s/g, '')}`}>
                <nav className="room-nav">
                    {Object.keys(ROOM_ICONS).map(r => (
                        <button key={r} onClick={() => setActiveRoom(r)} className={`room-btn ${activeRoom === r ? 'active' : ''}`}>
                            <i data-lucide={ROOM_ICONS[r]} className="w-5 h-5"></i>
                            <span>{r}</span>
                        </button>
                    ))}
                </nav>

                <div className="flex-container px-4 mt-6">
                    {columnedCategories.map((col, i) => (
                        <div key={i} className="column">
                            {col.map(cat => renderBox(cat))}
                        </div>
                    ))}
                </div>

                <button onClick={() => setIsModalOpen(true)} className="fixed bottom-10 right-10 w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center z-[80] active:scale-90 transition-all"><i data-lucide="plus" className="w-8 h-8"></i></button>

                {isModalOpen && (
                    <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/95 backdrop-blur-sm">
                        <div className="bg-[#111] w-full max-w-sm p-8 border border-white/5 rounded-3xl shadow-2xl">
                            <form onSubmit={async e => {
                                e.preventDefault();
                                await supabase.from('FancyPantry').insert([{ name: titleCase(newName), qty: newQty || "1", room: activeRoom === "Shopping List" ? "Fridge" : activeRoom, category: modalCat }]);
                                setIsModalOpen(false); setNewName(""); fetchItems();
                            }} className="space-y-6">
                                <div className="flex justify-between items-center mb-4"><h3 className="handwritten-header">New Item</h3><button type="button" onClick={() => setIsModalOpen(false)}><i data-lucide="x" className="w-6 h-6 text-stone-600"></i></button></div>
                                <div className="flex gap-2 overflow-x-auto pb-2 no-scrollbar">
                                    {Object.keys(CATEGORIES).map(c => <button type="button" key={c} onClick={() => setModalCat(c)} className={`px-4 py-3 text-[10px] border rounded-xl whitespace-nowrap font-bold ${modalCat === c ? 'bg-stone-200 text-black' : 'text-stone-800 border-white/5'}`}>{c}</button>)}
                                </div>
                                <input className="edit-input w-full" placeholder="Name..." value={newName} onChange={e => setNewName(e.target.value)} />
                                <div className="flex gap-4">
                                    <input type="number" className="edit-input w-24" placeholder="Qty" value={newQty} onChange={e => setNewQty(e.target.value)} />
                                    <button type="submit" className="flex-1 bg-white py-4 text-black font-black text-[11px] uppercase rounded-xl tracking-widest">Save</button>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<PantryApp />);
    </script>
</body>
</html>
