<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Professional</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=DM+Serif+Display&family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            background-color: #080807;
            background-image: 
                radial-gradient(circle at 50% -20%, rgba(30, 58, 138, 0.45) 0%, rgba(8, 8, 7, 1) 85%),
                url('https://www.transparenttextures.com/patterns/stardust.png');
            background-attachment: fixed;
            color: #f4f4f5; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            margin: 0;
        }

        .botanical-art { 
            position: fixed; bottom: 10px; right: 10px; width: 140px; 
            opacity: 0.15; pointer-events: none; filter: invert(1); z-index: 0;
        }

        .flex-container { 
            display: flex; flex-wrap: wrap; gap: 1.5rem; 
            position: relative; z-index: 1; justify-content: center; 
            padding: 20px; max-width: 1600px; margin: 0 auto;
        }

        .column { flex: 1; min-width: 280px; display: flex; flex-direction: column; gap: 1rem; }

        .note-box { 
            background: rgba(20, 20, 19, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 16px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            border-radius: 2px;
        }

        /* MOBILE FONT SIZES (Bumped up by ~3px) */
        .handwritten-header { 
            font-family: 'DM Serif Display', serif; 
            font-size: 1.2rem; /* Increased */
            letter-spacing: 0.05em; 
            display: flex; align-items: center; gap: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 6px;
            margin-bottom: 12px;
            text-transform: capitalize;
        }
        
        .handwritten { 
            font-family: 'Covered By Your Grace', cursive; 
            font-size: 1.15rem; /* Increased */
            color: #ffffff; 
            line-height: 1.2;
        }

        /* MOBILE NAVIGATION (Wrapped so they don't fall off) */
        .room-nav { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 1.5rem; 
            padding: 30px 15px; 
            flex-wrap: wrap; /* Allows stacking on small screens */
        }
        
        .room-btn { 
            font-size: 11px; font-weight: 900; letter-spacing: 0.4em; 
            color: #4b5563; text-transform: uppercase; transition: 0.4s ease;
            white-space: nowrap;
        }
        .room-btn.active { color: #fff; text-shadow: 0 0 20px rgba(255,255,255,0.5); }

        /* DESKTOP OVERRIDES (Kept exactly as you liked them) */
        @media (min-width: 1024px) {
            .handwritten-header { font-size: 0.95rem; }
            .handwritten { font-size: 0.85rem; }
            .room-nav { gap: 3rem; padding: 50px 10px; }
        }

        .export-btn {
            font-size: 10px; font-weight: 700; letter-spacing: 0.2em;
            color: rgba(255,255,255,0.3); text-transform: uppercase;
            border: 1px dashed rgba(255,255,255,0.1); padding: 6px 15px;
            border-radius: 50px; transition: 0.3s;
        }
        .export-btn:hover { color: #fff; border-color: rgba(255,255,255,0.5); }

        @keyframes rose-glow {
            0% { color: #fb7185; opacity: 1; }
            50% { color: #881337; opacity: 0.5; }
            100% { color: #fb7185; opacity: 1; }
        }
        .out-of-stock-text .handwritten { animation: rose-glow 3s infinite ease-in-out; }

        .edit-row { display: flex; gap: 6px; width: 100%; align-items: center; background: #000; padding: 4px; border-radius: 4px; }
        input.edit-input { 
            background: transparent; border: none; color: #fff; padding: 2px; 
            font-size: 10px !important; outline: none; flex: 1; min-width: 0;
        }

        .qty-label { font-size: 9px; font-weight: 900; opacity: 0.3; }

        .add-btn-main {
            position: fixed; bottom: 40px; right: 40px; width: 50px; height: 50px;
            background: #fff; color: #000; border-radius: 50%; display: flex;
            align-items: center; justify-content: center; z-index: 100;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const META = {
        "Produce": ["leaf", "#86efac"], "Dairy": ["milk", "#bae6fd"], "Protein": ["bone", "#fca5a5"],
        "Drinks": ["droplets", "#93c5fd"], "Condiments": ["utensils", "#fcd34d"], "Snacks": ["zap", "#fdba74"],
        "Meats & Seafood": ["anchor", "#f87171"], "Prepared Meals": ["package", "#cbd5e1"], 
        "Frozen Veg & Fruit": ["wind", "#4ade80"], "Desserts": ["ice-cream", "#f9a8d4"], 
        "Bakery & Breads": ["wheat", "#fde68a"], "Pasta & Grains": ["shrub", "#d9f99d"],
        "Cereal": ["box-select", "#bfdbfe"], "Cans & Jars": ["container", "#e5e7eb"], 
        "Baking Essentials": ["cookie", "#fbcfe8"], "Spreads & Jars": ["cup-soda", "#ddd6fe"], 
        "Sides": ["list-todo", "#a7f3d0"], "Supplies": ["cog", "#d4d4d8"], 
        "Dishware": ["utensils-2", "#d4d4d8"], "Misc": ["more-horizontal", "#d4d4d8"]
    };

    const AUTO_MAP = {
        "Produce": ["apple", "banana", "onion", "garlic", "lettuce", "tomato", "potato", "berry", "fruit", "veg", "cucumber"],
        "Dairy": ["milk", "cheese", "yogurt", "butter", "cream", "egg", "sour cream", "parmesan", "provalone"],
        "Protein": ["chicken", "beef", "pork", "steak", "turkey", "tofu", "tempeh", "sausage", "bacon", "eggs", "ham"],
        "Drinks": ["water", "juice", "soda", "coke", "beer", "wine", "coffee", "tea", "seltz"],
        "Condiments": ["sauce", "mayo", "ketchup", "mustard", "oil", "vinegar", "dressing", "jam", "jelly", "relish", "ranch", "soy"],
        "Frozen Veg & Fruit": ["frozen veg", "frozen fruit", "mixed veg", "peas", "corn"]
    };

    const getMeta = (catName) => {
        const match = Object.keys(META).find(k => k.toLowerCase() === catName.toLowerCase().trim());
        return META[match] || META["Misc"];
    };

    function PantryApp() {
        const [activeRoom, setActiveRoom] = useState("Fridge");
        const [items, setItems] = useState([]);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [editingId, setEditingId] = useState(null);
        const [editValue, setEditValue] = useState("");
        const [editQty, setEditQty] = useState("");
        const [newName, setNewName] = useState("");
        const [newQty, setNewQty] = useState("");
        const [modalRoom, setModalRoom] = useState("Fridge");
        const [modalCat, setModalCat] = useState("Misc");

        useEffect(() => { fetchItems(); }, []);
        useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, editingId, isModalOpen]);

        async function fetchItems() {
            const { data } = await supabase.from('FancyPantry').select('*').order('name');
            if (data) setItems(data);
        }

        const handleNameChange = (val) => {
            setNewName(val);
            const lowerVal = val.toLowerCase();
            for (const [cat, keywords] of Object.entries(AUTO_MAP)) {
                if (keywords.some(k => lowerVal.includes(k))) { setModalCat(cat); break; }
            }
        };

        const handleUpdate = async (id) => {
            await supabase.from('FancyPantry').update({ name: editValue, qty: editQty }).eq('id', id);
            setEditingId(null); fetchItems();
        };

        const downloadInventory = () => {
            const headers = ["Name", "Quantity", "Room", "Category"];
            const csvRows = items.map(i => [`"${i.name}"`, `"${i.qty}"`, `"${i.room}"`, `"${i.category || 'Misc'}"`].join(","));
            const csvContent = [headers.join(","), ...csvRows].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `Pantry_Inventory_${new Date().toLocaleDateString()}.csv`;
            link.click();
        };

        const grouped = useMemo(() => {
            const target = activeRoom.toLowerCase().replace(/\s/g, '');
            let filtered = items.filter(i => {
                const dbRoom = (i.room || "").toLowerCase().replace(/\s/g, '');
                if (target === "shoppinglist") return parseFloat(i.qty || 0) === 0;
                return dbRoom === target;
            });
            const sorted = [...filtered].sort((a, b) => {
                const aQty = parseFloat(a.qty || 0), bQty = parseFloat(b.qty || 0);
                if (aQty === 0 && bQty > 0) return 1;
                if (aQty > 0 && bQty === 0) return -1;
                return a.name.localeCompare(b.name);
            });
            return sorted.reduce((acc, i) => {
                const rawCat = i.category || "Misc";
                const matchKey = Object.keys(META).find(k => k.toLowerCase() === rawCat.toLowerCase().trim()) || "Misc";
                if (!acc[matchKey]) acc[matchKey] = [];
                acc[matchKey].push(i);
                return acc;
            }, {});
        }, [items, activeRoom]);

        const columnedCategories = useMemo(() => {
            const cols = [[], [], []];
            const colHeights = [0, 0, 0];
            const activeCats = Object.keys(grouped).sort((a, b) => grouped[b].length - grouped[a].length);
            activeCats.forEach(cat => {
                const shortest = colHeights.indexOf(Math.min(...colHeights));
                cols[shortest].push(cat);
                colHeights[shortest] += (grouped[cat].length + 3);
            });
            return cols;
        }, [grouped]);

        return (
            <div className="pb-40">
                <nav className="room-nav">
                    {["Fridge", "Freezer", "Dry Goods", "Shopping List"].map(r => (
                        <button key={r} onClick={() => setActiveRoom(r)} className={`room-btn ${activeRoom === r ? 'active' : ''}`}>{r}</button>
                    ))}
                    <button onClick={downloadInventory} className="export-btn flex items-center gap-2">
                        <i data-lucide="download" className="w-3 h-3"></i><span>Export</span>
                    </button>
                </nav>

                <div className="flex-container">
                    {columnedCategories.map((col, i) => (
                        <div key={i} className="column">
                            {col.map(cat => {
                                const meta = getMeta(cat);
                                return (
                                    <div key={cat} className="note-box">
                                        <h3 className="handwritten-header" style={{ color: meta[1] }}>
                                            <i data-lucide={meta[0]} className="w-4 h-4"></i>
                                            <span className="capitalize">{cat}</span>
                                        </h3>
                                        <ul className="space-y-3">
                                            {grouped[cat].map(item => (
                                                <li key={item.id} className={parseFloat(item.qty) === 0 && activeRoom !== "Shopping List" ? 'out-of-stock-text' : ''}>
                                                    {editingId === item.id ? (
                                                        <div className="edit-row">
                                                            <input className="edit-input handwritten" value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus />
                                                            <input className="edit-input !w-8 text-center font-bold" value={editQty} onChange={e => setEditQty(e.target.value)} />
                                                            <button onClick={() => handleUpdate(item.id)} className="bg-white text-black text-[7px] font-black px-2 py-1 rounded">OK</button>
                                                        </div>
                                                    ) : (
                                                        <div className="flex justify-between items-center cursor-pointer group" onClick={() => { setEditingId(item.id); setEditValue(item.name); setEditQty(item.qty); }}>
                                                            <span className="handwritten capitalize">{item.name}</span>
                                                            <div className="flex items-center gap-3">
                                                                <span className="qty-label">x{item.qty}</span>
                                                                <button onClick={(e) => { e.stopPropagation(); if(confirm("Delete?")) supabase.from('FancyPantry').delete().eq('id', item.id).then(fetchItems); }} className="opacity-0 group-hover:opacity-100 text-red-500 text-[12px]">×</button>
                                                            </div>
                                                        </div>
                                                    )}
                                                </li>
                                            ))}
                                        </ul>
                                    </div>
                                );
                            })}
                        </div>
                    ))}
                </div>

                <button onClick={() => {setModalRoom(activeRoom === "Shopping List" ? "Fridge" : activeRoom); setIsModalOpen(true)}} className="add-btn-main active:scale-90 transition-all"><i data-lucide="plus" className="w-6 h-6"></i></button>

                {isModalOpen && (
                    <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/90 backdrop-blur-md">
                        <div className="bg-[#111] w-full max-w-sm p-10 border border-white/10 rounded-lg shadow-2xl">
                            <form onSubmit={async e => {
                                e.preventDefault();
                                await supabase.from('FancyPantry').insert([{ name: newName, qty: newQty || "1", room: modalRoom, category: modalCat }]);
                                setIsModalOpen(false); setNewName(""); fetchItems();
                            }} className="space-y-8">
                                <h2 className="handwritten-header !text-white/20">New Entry</h2>
                                <div className="flex gap-1 overflow-x-auto no-scrollbar pb-2">
                                    {["Fridge", "Freezer", "Dry Goods"].map(r => (
                                        <button type="button" key={r} onClick={() => setModalRoom(r)} className={`px-3 py-2 text-[8px] font-black border transition-all rounded ${modalRoom === r ? 'bg-white text-black border-white' : 'text-white/20 border-white/5'}`}>{r.toUpperCase()}</button>
                                    ))}
                                </div>
                                <div className="flex flex-wrap gap-1">
                                    {Object.keys(META).map(c => (
                                        <button type="button" key={c} onClick={() => setModalCat(c)} className={`px-2 py-1.5 text-[7px] font-bold border rounded transition-all ${modalCat === c ? 'bg-white/80 text-black border-white' : 'text-white/20 border-white/5'}`}>{c}</button>
                                    ))}
                                </div>
                                <input className="w-full bg-transparent border-b border-white/10 py-3 text-xl outline-none focus:border-white transition-colors text-white" placeholder="Name..." value={newName} onChange={e => handleNameChange(e.target.value)} autoFocus />
                                <div className="flex gap-4">
                                    <input className="w-16 bg-transparent border-b border-white/10 py-3 text-lg outline-none" placeholder="1" value={newQty} onChange={e => setNewQty(e.target.value)} />
                                    <button type="submit" className="flex-1 bg-white text-black font-black uppercase tracking-widest h-12 rounded text-[10px]">Save</button>
                                </div>
                                <button type="button" onClick={() => setIsModalOpen(false)} className="w-full text-[8px] opacity-40 uppercase tracking-widest">Cancel</button>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<PantryApp />);
    </script>
</body>
</html>
