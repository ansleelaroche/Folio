<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Professional</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #171717; color: #E7E5E4; min-height: 100vh; overflow-x: hidden; }
        .vines-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.1; }
        .glass-card { background: #262626; border: 1px solid rgba(255, 255, 255, 0.05); }
        .shelf-header { display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255, 255, 255, 0.1); margin-bottom: 1.25rem; padding-bottom: 0.5rem; }
        .accent-bar { width: 4px; height: 100%; position: absolute; left: 0; top: 0; border-radius: 4px 0 0 4px; }
        .modal-overlay { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px); }
        .modal-content { background: #1c1917; border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="antialiased font-light tracking-tight uppercase">
    <div class="vines-container">
        <svg style="position:absolute; top:0; left:0; width:300px; height:300px;" viewBox="0 0 100 100">
            <path d="M0,0 Q30,10 40,50 T90,80" stroke="#4d7c0f" stroke-width="0.4" fill="none" />
        </svg>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const ROOMS = ["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"];

        const ALL_CATEGORIES = {
            // FRIDGE CATEGORIES
            "Produce": { rooms: ["Fridge", "Counter"], bar: "bg-emerald-600", text: "text-emerald-500", icon: "leaf" },
            "Dairy": { rooms: ["Fridge"], bar: "bg-stone-300", text: "text-stone-300", icon: "milk" },
            "Protein": { rooms: ["Fridge", "Counter"], bar: "bg-orange-700", text: "text-orange-600", icon: "bone" },
            "Drinks": { rooms: ["Fridge", "Pantry"], bar: "bg-teal-800", text: "text-teal-600", icon: "droplets" },
            "Condiments": { rooms: ["Fridge", "Pantry"], bar: "bg-amber-600", text: "text-amber-500", icon: "utensils" },
            
            // FREEZER CATEGORIES
            "Meats & Seafood": { rooms: ["Freezer"], bar: "bg-rose-900", text: "text-rose-500", icon: "anchor" },
            "Prepared Meals": { rooms: ["Freezer"], bar: "bg-indigo-800", text: "text-indigo-400", icon: "box" },
            "Frozen Veg & Fruit": { rooms: ["Freezer"], bar: "bg-cyan-700", text: "text-cyan-500", icon: "leaf" },
            "Appetizers": { rooms: ["Freezer"], bar: "bg-orange-900", text: "text-orange-500", icon: "zap" },
            "Desserts": { rooms: ["Freezer"], bar: "bg-pink-900", text: "text-pink-400", icon: "ice-cream" },
            
            // GENERAL
            "Pantry Staples": { rooms: ["Pantry", "Cabinets"], bar: "bg-yellow-600", text: "text-yellow-600", icon: "container" },
            "Misc": { rooms: ROOMS, bar: "bg-stone-500", text: "text-stone-500", icon: "more-horizontal" }
        };

        function PantryApp() {
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // Modal Form State
            const [modalRoom, setModalRoom] = useState("Fridge");
            const [modalCat, setModalCat] = useState("Misc");
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, isModalOpen, modalRoom, modalCat]);

            // Reset modal category when room changes in modal
            useEffect(() => {
                const available = Object.keys(ALL_CATEGORIES).filter(cat => ALL_CATEGORIES[cat].rooms.includes(modalRoom));
                setModalCat(available[0] || "Misc");
            }, [modalRoom]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName || isSyncing) return;
                setIsSyncing(true);
                const nameToAdd = newName.trim();
                const qtyToAdd = parseFloat(newQty) || 1;
                const existing = items.find(i => i.room === modalRoom && i.name?.toLowerCase() === nameToAdd.toLowerCase());

                try {
                    if (existing) {
                        const newTotal = (parseFloat(existing.qty || 0) + qtyToAdd).toString();
                        await supabase.from('FancyPantry').update({ qty: newTotal }).eq('id', existing.id);
                    } else {
                        await supabase.from('FancyPantry').insert([{ name: nameToAdd, qty: qtyToAdd.toString(), room: modalRoom, category: modalCat }]);
                    }
                    await fetchItems();
                    setNewName(""); setNewQty("");
                } finally {
                    setIsSyncing(false);
                }
            };

            const removeItem = async (id) => {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            };

            const groupedItems = useMemo(() => {
                const filtered = items.filter(i => i && i.room === activeRoom);
                return filtered.reduce((acc, item) => {
                    const matchedCat = Object.keys(ALL_CATEGORIES).find(k => k.toLowerCase() === (item.category || "Misc").toLowerCase()) || "Misc";
                    if (!acc[matchedCat]) acc[matchedCat] = [];
                    acc[matchedCat].push(item);
                    return acc;
                }, {});
            }, [items, activeRoom]);

            return (
                <div className="max-w-4xl mx-auto px-6 pt-12 pb-24">
                    <header className="mb-10 flex justify-between items-baseline">
                        <h1 className="text-sm font-black tracking-[0.5em] text-stone-600 uppercase">{activeRoom}</h1>
                        <span className="text-[10px] font-medium text-stone-500 lowercase italic">Inventory</span>
                    </header>

                    <nav className="flex gap-2 overflow-x-auto pb-6 mb-10 no-scrollbar">
                        {ROOMS.map(room => (
                            <button key={room} onClick={() => setActiveRoom(room)}
                                className={`px-5 py-2 rounded-lg text-[10px] font-black transition-all border ${
                                    activeRoom === room ? "bg-stone-200 text-stone-900 border-stone-200" : "bg-transparent text-stone-600 border-white/10"
                                }`}>
                                {room}
                            </button>
                        ))}
                    </nav>

                    <div className="space-y-14">
                        {Object.keys(ALL_CATEGORIES).map(cat => groupedItems[cat] && (
                            <section key={cat}>
                                <div className="shelf-header">
                                    <i data-lucide={ALL_CATEGORIES[cat].icon} className={`w-4 h-4 ${ALL_CATEGORIES[cat].text}`}></i>
                                    <h2 className={`text-[10px] font-black tracking-[0.4em] uppercase ${ALL_CATEGORIES[cat].text}`}>{cat}</h2>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                    {groupedItems[cat].map(item => (
                                        <div key={item.id} className="glass-card relative p-4 pl-6 rounded-lg flex justify-between items-center group overflow-hidden">
                                            <div className={`accent-bar ${ALL_CATEGORIES[cat].bar}`}></div>
                                            <div className="min-w-0">
                                                <p className="text-[11px] font-bold text-stone-100 truncate tracking-tight lowercase first-letter:uppercase">{item.name}</p>
                                                <p className="text-[9px] text-stone-500 font-black mt-1 tracking-widest">X {item.qty}</p>
                                            </div>
                                            <button onClick={() => removeItem(item.id)} className="text-stone-700 hover:text-stone-300 transition-colors">
                                                <i data-lucide="x" className="w-3.5 h-3.5"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </div>

                    <button onClick={() => setIsModalOpen(true)} className="fixed bottom-8 right-8 w-16 h-16 bg-stone-100 text-stone-900 rounded-full shadow-2xl flex items-center justify-center z-40">
                        <i data-lucide="plus" className="w-8 h-8"></i>
                    </button>

                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="modal-overlay absolute inset-0" onClick={() => setIsModalOpen(false)}></div>
                            <div className="modal-content relative w-full max-w-lg rounded-[2.5rem] p-8">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-stone-500 text-[10px] font-black tracking-[0.5em] uppercase">Stock Entry</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="text-stone-700 hover:text-stone-100"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>

                                <div className="space-y-6">
                                    {/* 1. SELECT ROOM FIRST */}
                                    <div className="space-y-2">
                                        <label className="text-[8px] font-black text-stone-700 tracking-widest">1. SELECT LOCATION</label>
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                            {ROOMS.map(r => (
                                                <button key={r} onClick={() => setModalRoom(r)} className={`px-4 py-2 rounded-xl text-[9px] font-bold border transition-all ${modalRoom === r ? "bg-stone-100 text-stone-900 border-stone-100" : "bg-transparent text-stone-600 border-white/10"}`}>{r}</button>
                                            ))}
                                        </div>
                                    </div>

                                    {/* 2. SELECT CATEGORY SECOND */}
                                    <div className="space-y-2">
                                        <label className="text-[8px] font-black text-stone-700 tracking-widest">2. SELECT CATEGORY</label>
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                            {Object.keys(ALL_CATEGORIES).filter(cat => ALL_CATEGORIES[cat].rooms.includes(modalRoom)).map(cat => (
                                                <button key={cat} onClick={() => setModalCat(cat)} className={`px-4 py-2 rounded-xl text-[9px] font-bold border transition-all flex items-center gap-2 ${modalCat === cat ? "bg-stone-200 text-stone-900 border-stone-200" : "bg-transparent text-stone-600 border-white/10"}`}>
                                                    <i data-lucide={ALL_CATEGORIES[cat].icon} className="w-3 h-3"></i> {cat}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <form onSubmit={handleAddItem} className="space-y-6 pt-4 border-t border-white/5">
                                        <div className="space-y-2">
                                            <label className="text-[8px] font-black text-stone-700 tracking-widest ml-1">ITEM NAME</label>
                                            <input autoFocus type="text" placeholder="Entry name..." value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full bg-white/5 border border-white/5 rounded-2xl px-5 py-4 outline-none text-stone-100" />
                                        </div>
                                        <div className="flex gap-4">
                                            <div className="flex-1 space-y-2">
                                                <label className="text-[8px] font-black text-stone-700 tracking-widest ml-1">QTY</label>
                                                <input type="text" inputMode="decimal" placeholder="1" value={newQty} onChange={(e) => setNewQty(e.target.value)} className="w-full bg-white/5 border border-white/5 rounded-2xl px-5 py-4 outline-none text-stone-100" />
                                            </div>
                                            <button type="submit" disabled={isSyncing} className="bg-stone-200 text-stone-900 h-[60px] px-8 rounded-2xl font-black text-xs hover:bg-white active:scale-95 transition-all flex items-center gap-2 self-end">
                                                {isSyncing ? <i data-lucide="refresh-cw" className="w-4 h-4 animate-spin"></i> : <i data-lucide="plus" className="w-4 h-4"></i>} ADD
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
