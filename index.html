<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Pro</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #121212; color: #E7E5E4; min-height: 100vh; overflow: hidden; font-family: 'Inter', sans-serif; }
        
        .sidebar-glass { background: rgba(28, 28, 28, 0.6); backdrop-filter: blur(20px); border-right: 1px solid rgba(255, 255, 255, 0.05); }
        .card-glass { background: rgba(38, 38, 38, 0.5); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.03); transition: all 0.2s ease; }
        .card-glass:hover { background: rgba(45, 45, 45, 0.8); border-color: rgba(255, 255, 255, 0.1); }
        
        .vines-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.08; }
        
        .active-glow { position: relative; }
        .active-glow::before { content: ''; position: absolute; left: -12px; top: 20%; height: 60%; width: 3px; background: #525252; border-radius: 0 4px 4px 0; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="antialiased tracking-tight">
    <div class="vines-bg">
        <svg width="100%" height="100%"><path d="M0,0 Q150,100 300,600 T600,900" stroke="#4d7c0f" stroke-width="1" fill="none" /></svg>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const ROOMS = ["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"];
        const CATEGORIES = {
            "Produce": { icon: "leaf", color: "#4ade80", rooms: ["Fridge", "Counter"], keywords: ["apple", "lettuce", "onion", "carrot", "fruit", "veg", "tomato", "potato", "garlic"] },
            "Dairy": { icon: "milk", color: "#e7e5e4", rooms: ["Fridge"], keywords: ["milk", "cheese", "yogurt", "butter", "egg", "cream"] },
            "Protein": { icon: "beef", color: "#f87171", rooms: ["Fridge", "Freezer"], keywords: ["chicken", "beef", "meat", "fish", "steak", "bacon"] },
            "Drinks": { icon: "cup-soda", color: "#38bdf8", rooms: ["Fridge", "Pantry"], keywords: ["water", "soda", "juice", "wine", "beer", "coffee"] },
            "Condiments": { icon: "utensils", color: "#fbbf24", rooms: ["Fridge", "Pantry"], keywords: ["mayo", "ranch", "ketchup", "sauce", "syrup"] },
            "Baking": { icon: "cookie", color: "#a8a29e", rooms: ["Cabinets", "Pantry"], keywords: ["flour", "sugar", "yeast", "cocoa"] },
            "Frozen": { icon: "snowflake", color: "#22d3ee", rooms: ["Freezer"], keywords: ["frozen", "ice", "pizza"] },
            "Misc": { icon: "archive", color: "#78716c", rooms: ROOMS, keywords: [] }
        };

        function PantryApp() {
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            
            // Form State
            const [modalRoom, setModalRoom] = useState("Fridge");
            const [modalCat, setModalCat] = useState("Misc");
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, isModalOpen, modalRoom, modalCat]);

            // Brain: Logic to switch rooms/categories based on typing
            useEffect(() => {
                if (!newName) return;
                const low = newName.toLowerCase();
                for (const [name, cfg] of Object.entries(CATEGORIES)) {
                    if (cfg.keywords.some(k => low.includes(k))) {
                        setModalCat(name);
                        if (!cfg.rooms.includes(modalRoom)) setModalRoom(cfg.rooms[0]);
                        return;
                    }
                }
            }, [newName]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName || isSyncing) return;
                setIsSyncing(true);
                const cleanName = newName.trim();
                const qtyValue = newQty || "1";
                const existing = items.find(i => i.room === modalRoom && i.name?.toLowerCase() === cleanName.toLowerCase());

                try {
                    if (existing) {
                        const nextQty = (parseFloat(existing.qty || 0) + parseFloat(qtyValue)).toString();
                        await supabase.from('FancyPantry').update({ qty: nextQty }).eq('id', existing.id);
                    } else {
                        await supabase.from('FancyPantry').insert([{ name: cleanName, qty: qtyValue, room: modalRoom, category: modalCat }]);
                    }
                    await fetchItems();
                    setNewName(""); setNewQty("");
                } finally { setIsSyncing(false); }
            };

            const removeItem = async (id) => {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            };

            const filteredItems = useMemo(() => {
                const roomItems = items.filter(i => i.room === activeRoom);
                return roomItems.reduce((acc, i) => {
                    const cat = i.category || "Misc";
                    if (!acc[cat]) acc[cat] = [];
                    acc[cat].push(i);
                    return acc;
                }, {});
            }, [items, activeRoom]);

            return (
                <div className="flex h-screen w-full">
                    {/* SIDEBAR */}
                    <aside className="hidden md:flex flex-col w-72 sidebar-glass p-8 z-20">
                        <div className="mb-12">
                            <h1 className="text-xl font-light tracking-[0.2em] uppercase italic">FancyPantry</h1>
                            <p className="text-[10px] text-stone-500 font-bold tracking-widest mt-1">STOCK MANAGEMENT</p>
                        </div>
                        
                        <div className="space-y-8 flex-1 overflow-y-auto no-scrollbar">
                            <nav className="space-y-4">
                                <label className="text-[9px] font-black text-stone-600 tracking-widest">LOCATIONS</label>
                                {ROOMS.map(r => (
                                    <button key={r} onClick={() => setActiveRoom(r)} className={`flex items-center w-full text-left text-sm transition-all ${activeRoom === r ? 'text-white active-glow translate-x-2' : 'text-stone-500 hover:text-stone-300'}`}>
                                        {r}
                                    </button>
                                ))}
                            </nav>

                            <div className="space-y-4">
                                <label className="text-[9px] font-black text-stone-600 tracking-widest">CATEGORIES</label>
                                {Object.entries(CATEGORIES).map(([name, cfg]) => (
                                    <div key={name} className="flex items-center gap-3 text-xs text-stone-500 opacity-60">
                                        <i data-lucide={cfg.icon} className="w-3.5 h-3.5"></i>
                                        <span>{name}</span>
                                    </div>
                                ))}
                            </div>
                        </div>

                        <button onClick={() => { setModalRoom(activeRoom); setIsModalOpen(true); }} className="mt-8 bg-stone-100 text-stone-900 py-4 rounded-xl font-black text-[10px] tracking-widest uppercase hover:bg-white transition-all">
                            Add New Item
                        </button>
                    </aside>

                    {/* MAIN CONTENT */}
                    <main className="flex-1 overflow-y-auto p-6 md:p-16 relative">
                        <div className="max-w-5xl mx-auto">
                            <header className="mb-12 flex justify-between items-end">
                                <div>
                                    <h2 className="text-4xl font-light tracking-tight">{activeRoom}</h2>
                                    <div className="h-1 w-12 bg-stone-800 mt-4"></div>
                                </div>
                                <span className="text-[10px] font-bold text-stone-600 tracking-widest">UNIT COUNT: {items.filter(i => i.room === activeRoom).length}</span>
                            </header>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                {Object.keys(CATEGORIES).map(cat => filteredItems[cat] && (
                                    <section key={cat} className="space-y-6">
                                        <div className="flex items-center gap-3 border-b border-white/5 pb-3">
                                            <i data-lucide={CATEGORIES[cat].icon} className="w-4 h-4 text-stone-500"></i>
                                            <h3 className="text-[10px] font-black tracking-[0.3em] uppercase text-stone-500">{cat}</h3>
                                        </div>
                                        <div className="grid gap-2">
                                            {filteredItems[cat].map(item => (
                                                <div key={item.id} className="card-glass p-4 rounded-xl flex justify-between items-center group">
                                                    <div className="min-w-0">
                                                        <p className="text-sm font-medium text-stone-200 lowercase first-letter:uppercase">{item.name}</p>
                                                        <p className="text-[10px] text-stone-600 font-bold mt-0.5 uppercase tracking-tighter">Quantity: {item.qty}</p>
                                                    </div>
                                                    <button onClick={() => removeItem(item.id)} className="opacity-0 group-hover:opacity-100 text-stone-700 hover:text-red-400 transition-all">
                                                        <i data-lucide="trash-2" className="w-4 h-4"></i>
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        </div>

                        {/* Mobile Add Button */}
                        <button onClick={() => { setModalRoom(activeRoom); setIsModalOpen(true); }} className="md:hidden fixed bottom-8 right-8 w-16 h-16 bg-white text-black rounded-full shadow-2xl flex items-center justify-center z-30">
                            <i data-lucide="plus" className="w-8 h-8"></i>
                        </button>
                    </main>

                    {/* MODAL */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-md">
                            <div className="bg-[#1a1a1a] w-full max-w-lg rounded-[2.5rem] p-8 border border-white/5 animate-slide-up">
                                <div className="flex justify-between items-center mb-8">
                                    <h2 className="text-[10px] font-black tracking-[0.4em] uppercase text-stone-500">Inventory Entry</h2>
                                    <button onClick={() => setIsModalOpen(false)} className="text-stone-600 hover:text-white"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>

                                <div className="space-y-8">
                                    <div className="space-y-3">
                                        <label className="text-[9px] font-bold text-stone-700 tracking-widest uppercase">Location</label>
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                            {ROOMS.map(r => (
                                                <button key={r} onClick={() => setModalRoom(r)} className={`px-4 py-2 rounded-lg text-[10px] font-bold transition-all border ${modalRoom === r ? 'bg-stone-100 text-stone-900 border-stone-100' : 'bg-transparent text-stone-600 border-white/10'}`}>{r}</button>
                                            ))}
                                        </div>
                                    </div>

                                    <div className="space-y-3">
                                        <label className="text-[9px] font-bold text-stone-700 tracking-widest uppercase">Category</label>
                                        <div className="flex gap-2 overflow-x-auto no-scrollbar">
                                            {Object.keys(CATEGORIES).filter(c => CATEGORIES[c].rooms.includes(modalRoom)).map(c => (
                                                <button key={c} onClick={() => setModalCat(c)} className={`px-4 py-2 rounded-lg text-[10px] font-bold transition-all flex items-center gap-2 border whitespace-nowrap ${modalCat === c ? 'bg-stone-100 text-stone-900 border-stone-100' : 'bg-transparent text-stone-600 border-white/10'}`}>
                                                    <i data-lucide={CATEGORIES[c].icon} className="w-3 h-3"></i> {c}
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <form onSubmit={handleAddItem} className="space-y-6 pt-6 border-t border-white/5">
                                        <div className="space-y-2">
                                            <input autoFocus type="text" placeholder="Item name..." value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full bg-white/5 border border-white/5 rounded-2xl px-6 py-4 outline-none text-stone-200 placeholder:text-stone-800" />
                                        </div>
                                        <div className="flex gap-4">
                                            <input type="text" placeholder="Qty" value={newQty} onChange={(e) => setNewQty(e.target.value)} className="w-24 bg-white/5 border border-white/5 rounded-2xl px-6 py-4 outline-none text-stone-200 text-center" />
                                            <button type="submit" disabled={isSyncing} className="flex-1 bg-stone-100 text-stone-900 rounded-2xl font-black text-[10px] tracking-widest uppercase flex items-center justify-center gap-2">
                                                {isSyncing ? <i data-lucide="refresh-cw" className="w-4 h-4 animate-spin"></i> : <i data-lucide="plus" className="w-4 h-4"></i>} Add to Inventory
                                            </button>
                                        </div>
                                    </form>
                                    <p className="text-center text-[8px] font-bold text-stone-800 tracking-widest uppercase italic">Multi-entry active</p>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
