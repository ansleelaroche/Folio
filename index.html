<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Professional</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;700;900&display=swap');
    
    body { 
        background-color: #0a0a0a; 
        color: #e4e4e7; 
        font-family: 'Inter', sans-serif; 
        min-height: 100vh;
        background-image: radial-gradient(circle at 50% 0%, #161616 0%, #0a0a0a 100%);
    }

    .flex-container { display: flex; flex-wrap: wrap; gap: 1.5rem; }
    .column { flex: 1; min-width: 300px; display: flex; flex-direction: column; gap: 1.5rem; }

    /* LUXURY CARD DESIGN */
    .note-box { 
        background: #111110; 
        border: 1px solid #222; 
        padding: 24px; 
        position: relative;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        border-radius: 4px; /* Sharp, architectural corners */
    }

    /* EDITORIAL TYPOGRAPHY */
    .handwritten-header { 
        font-family: 'DM Serif Display', serif; 
        font-size: 1.5rem; 
        letter-spacing: 0.03em; 
        text-transform: capitalize; /* More high-end than all-caps */
        border-bottom: 1px solid rgba(255,255,255,0.1);
        padding-bottom: 12px;
        display: block;
        margin-bottom: 16px;
        opacity: 1 !important;
    }

    .handwritten { 
        font-family: 'Inter', sans-serif; 
        font-weight: 300; /* Light and airy */
        font-size: 1rem; 
        line-height: 1.4; 
        color: #d1d1d6; 
    }
    
    /* SOPHISTICATED JEWEL TONES */
    .room-Fridge .handwritten-header { color: #fdfcf0; } /* Champagne */
    .room-Freezer .handwritten-header { color: #e0e7ff; } /* Ice Blue */
    .room-DryGoods .handwritten-header { color: #dcfce7; } /* Soft Mint */
    .room-ShoppingList .handwritten-header { color: #f5f3ff; } /* Soft Petal */

    /* NAVIGATION BUTTONS */
    .room-btn { 
        transition: all 0.3s ease; 
        font-size: 12px; 
        font-weight: 700; 
        letter-spacing: 0.1em; 
        color: #52525b; 
        text-transform: uppercase;
    }
    .room-btn:hover { color: #ffffff; }
    .room-btn.active { color: #ffffff !important; border-bottom: 2px solid #ffffff; }

    /* REFINED PULSE */
    @keyframes rose-glow {
        0% { color: #fda4af; text-shadow: 0 0 0px rgba(253,164,175,0); }
        50% { color: #fb7185; text-shadow: 0 0 10px rgba(251,113,133,0.3); }
        100% { color: #fda4af; text-shadow: 0 0 0px rgba(253,164,175,0); }
    }

    .out-of-stock-text span, 
    .out-of-stock-text { 
        animation: rose-glow 3s infinite ease-in-out;
        font-weight: 600;
    } 
    
    .room-ShoppingList .out-of-stock-text span,
    .room-ShoppingList .out-of-stock-text { 
        animation: none !important;
        color: #f4f4f5 !important; 
        text-shadow: none !important;
    }

    /* DESKTOP COMPACT SCALING */
    @media (min-width: 768px) {
        .handwritten { font-size: 0.85rem; }
        .handwritten-header { font-size: 1.1rem; }
        .note-box { padding: 16px; }
    }

    input.inline-edit { 
        background: #000; 
        border: 1px solid #444; 
        color: white; 
        padding: 4px 8px; 
        border-radius: 2px;
    }
    .no-scrollbar::-webkit-scrollbar { display: none; }
</style>
</head>
<body class="antialiased p-4 md:p-6">
    <svg class="botanical-art" viewBox="0 0 100 100"><path d="M10,90 Q30,70 20,40 T50,20 T90,10" stroke="white" fill="none" stroke-width="0.3"/></svg>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;
    const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const ROOM_ICONS = { "Fridge": "refrigerator", "Freezer": "snowflake", "Dry Goods": "layout-dashboard", "Shopping List": "shopping-cart" };
    
    const CATEGORIES = {
        "Produce": ["leaf", ["Fridge", "Dry Goods"]], "Dairy": ["milk", ["Fridge"]], "Protein": ["bone", ["Fridge", "Freezer"]],
        "Drinks": ["droplets", ["Fridge", "Dry Goods"]], "Condiments": ["utensils", ["Fridge", "Dry Goods"]],
        "Meats & Seafood": ["anchor", ["Freezer"]], "Prepared Meals": ["box", ["Freezer"]], "Frozen Veg & Fruit": ["leaf", ["Freezer"]],
        "Desserts": ["ice-cream", ["Freezer"]], "Bakery & Breads": ["wheat", ["Dry Goods"]], "Snacks": ["zap", ["Dry Goods"]],
        "Pasta & Grains": ["shrub", ["Dry Goods"]], "Cereal": ["box-select", ["Dry Goods"]], "Cans & Jars": ["container", ["Dry Goods"]],
        "Baking Essentials": ["cookie", ["Dry Goods"]], "Spreads & Jars": ["cup-soda", ["Dry Goods"]], "Sides": ["list-todo", ["Dry Goods"]],
        "Supplies": ["cog", ["Dry Goods"]], "Dishware": ["utensils-2", ["Dry Goods"]], "Misc": ["more-horizontal", ["Fridge", "Freezer", "Dry Goods"]]
    };

    const AUTO_MAP = {
        "Produce": ["apple", "banana", "onion", "garlic", "lettuce", "tomato", "potato", "berry", "fruit", "veg", "spinach", "kale", "pepper", "carrot"],
        "Dairy": ["milk", "cheese", "yogurt", "butter", "cream", "egg", "sour cream"],
        "Protein": ["chicken", "beef", "pork", "steak", "turkey", "tofu", "tempeh", "sausage", "bacon", "eggs"],
        "Drinks": ["water", "juice", "soda", "coke", "beer", "wine", "coffee", "tea", "milk", "seltz"],
        "Condiments": ["sauce", "mayo", "ketchup", "mustard", "oil", "vinegar", "dressing", "jam", "jelly", "honey", "syrup"],
        "Snacks": ["chip", "cracker", "nut", "bar", "pretzel", "popcorn", "cookie", "candy"],
        "Bakery & Breads": ["bread", "bagel", "tortilla", "muffin", "bun", "pita", "toast"],
        "Pasta & Grains": ["pasta", "rice", "noodle", "quinoa", "couscous", "spaghetti", "penne"],
        "Frozen Veg & Fruit": ["frozen veg", "frozen fruit", "mixed veg", "peas", "corn"],
        "Meats & Seafood": ["fish", "shrimp", "salmon", "shrimp", "cod", "tuna"]
    };

    const titleCase = (str) => str.toLowerCase().split(' ').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join(' ');
    const isDogFood = (name) => {
        const n = name.toLowerCase();
        return ["ground turkey", "veggies", "berries", "kidney beans", "white rice", "sweet potato"].some(k => n.includes(k));
    };

    function PantryApp() {
        const [activeRoom, setActiveRoom] = useState("Fridge");
        const [items, setItems] = useState([]);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [modalRoom, setModalRoom] = useState("Fridge");
        const [modalCat, setModalCat] = useState("Misc");
        const [newName, setNewName] = useState("");
        const [newQty, setNewQty] = useState("");
        const [editingId, setEditingId] = useState(null);
        const [editValue, setEditValue] = useState("");
        const [editQty, setEditQty] = useState("");

        useEffect(() => { fetchItems(); }, []);
        useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, editingId, isModalOpen]);

        async function fetchItems() {
            const { data } = await supabase.from('FancyPantry').select('*').order('name');
            if (data) setItems(data);
        }

        const handleNameChange = (val) => {
            setNewName(val);
            const lowerVal = val.toLowerCase();
            for (const [cat, keywords] of Object.entries(AUTO_MAP)) {
                if (keywords.some(k => lowerVal.includes(k))) {
                    setModalCat(cat);
                    break;
                }
            }
        };

        const startEdit = (item) => {
            setEditingId(item.id);
            setEditValue(item.name);
            setEditQty(item.qty);
        };

        const saveInlineEdit = async (id) => {
            const formatted = titleCase(editValue.trim());
            await supabase.from('FancyPantry').update({ name: formatted, qty: editQty }).eq('id', id);
            setEditingId(null);
            fetchItems();
        };

        const handleAddItem = async (e) => {
            e.preventDefault();
            if (!newName) return;
            const formattedName = titleCase(newName.trim());
            await supabase.from('FancyPantry').insert([{ name: formattedName, qty: newQty || "1", room: modalRoom, category: modalCat }]);
            setIsModalOpen(false); setNewName(""); setNewQty(""); setModalCat("Misc");
            fetchItems();
        };

        const removeItem = async (id) => {
            if(confirm("Delete this item permanently?")) {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            }
        };

        const downloadInventory = () => {
            const headers = ["Name", "Quantity", "Room", "Category"];
            const csvRows = items.map(i => [`"${i.name}"`, `"${i.qty}"`, `"${i.room}"`, `"${i.category || 'Misc'}"`].join(","));
            const csvContent = [headers.join(","), ...csvRows].join("\n");
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement("a");
            link.setAttribute("href", url);
            link.setAttribute("download", `FancyPantry_Inventory_${new Date().toLocaleDateString()}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        const grouped = useMemo(() => {
            const target = activeRoom.toLowerCase().replace(/\s/g, '');
            let filtered = items.filter(i => {
                const dbRoom = (i.room || "").toLowerCase().replace(/\s/g, '');
                if (target === "shoppinglist") return parseFloat(i.qty || 0) === 0;
                if (target === "drygoods") return ["drygoods", "pantry", "counter", "cabinets"].includes(dbRoom);
                return dbRoom === target;
            });
            return [...filtered].sort((a, b) => {
                const aQty = parseFloat(a.qty || 0), bQty = parseFloat(b.qty || 0);
                if (aQty === 0 && bQty > 0) return 1;
                if (aQty > 0 && bQty === 0) return -1;
                return a.name.localeCompare(b.name);
            }).reduce((acc, i) => {
                const dbCat = (i.category || "Misc").toLowerCase().trim();
                const matchedKey = Object.keys(CATEGORIES).find(k => k.toLowerCase() === dbCat) || "Misc";
                if (!acc[matchedKey]) acc[matchedKey] = [];
                acc[matchedKey].push(i);
                return acc;
            }, {});
        }, [items, activeRoom]);

        const columnedCategories = useMemo(() => {
            const cols = [[], [], []], colHeights = [0, 0, 0];
            const activeCats = Object.keys(CATEGORIES).filter(cat => grouped[cat]).sort((a, b) => grouped[b].length - grouped[a].length);
            activeCats.forEach(cat => {
                const shortestColIndex = colHeights.indexOf(Math.min(...colHeights));
                cols[shortestColIndex].push(cat);
                colHeights[shortestColIndex] += (grouped[cat].length + 5);
            });
            return cols;
        }, [grouped]);
        
        const renderBox = (cat) => (
            <div key={cat} className="note-box">
                <div className="flex items-center gap-2 mb-4">
                    <i data-lucide={CATEGORIES[cat]?.[0] || 'dot'} className="w-4 h-4 text-white/20 mb-1"></i>
                    <h3 className="handwritten-header">{cat}</h3>
                </div>
                <ul className="space-y-4">
                    {grouped[cat].map(item => (
                        <li key={item.id} className={`flex justify-between items-start group min-h-[1.5rem] ${parseFloat(item.qty) === 0 && activeRoom !== "Shopping List" ? 'out-of-stock-text' : ''}`}>
                            {editingId === item.id ? (
                                <div className="flex items-center gap-2 w-full">
                                    <input className="inline-edit handwritten flex-1 min-w-0" value={editValue} onChange={(e) => setEditValue(e.target.value)} autoFocus />
                                    <div className="flex items-center gap-1 shrink-0">
                                        <span className="text-[10px] text-white/50">x</span>
                                        <input className="w-10 inline-edit text-[11px] font-bold text-center" value={editQty} onChange={(e) => setEditQty(e.target.value)} />
                                        <button onClick={() => saveInlineEdit(item.id)} className="bg-white text-black rounded p-1 ml-1"><i data-lucide="check" className="w-4 h-4"></i></button>
                                    </div>
                                </div>
                            ) : (
                                <>
                                    <div className="flex items-start gap-2 cursor-text min-w-0 flex-1 mr-2" onClick={() => startEdit(item)}>
                                        <span className="handwritten whitespace-normal break-words leading-tight capitalize text-white">{titleCase(item.name)}</span>
                                        {isDogFood(item.name) && <i data-lucide="paw-print" className="w-4 h-4 text-amber-200/60 shrink-0 mt-1"></i>}
                                    </div>
                                    <div className="flex items-center gap-3 shrink-0 pt-0.5">
                                        <span className="text-[11px] font-black tracking-tighter text-white/80" onClick={() => startEdit(item)}>x{item.qty}</span>
                                        <button onClick={(e) => { e.stopPropagation(); removeItem(item.id); }} className="opacity-0 group-hover:opacity-100 text-red-500/50 hover:text-red-500 text-[12px] px-1 font-bold">×</button>
                                    </div>
                                </>
                            )}
                        </li>
                    ))}
                </ul>
            </div>
        );

        return (
            <div className={`max-w-7xl mx-auto pb-32 room-${activeRoom.replace(/\s/g, '')}`}>
                <nav className="flex justify-center items-center gap-4 md:gap-8 mb-10 overflow-x-auto no-scrollbar py-2">
                    {Object.keys(ROOM_ICONS).map(r => (
                        <button key={r} onClick={() => setActiveRoom(r)} className={`room-btn flex items-center gap-2 px-4 py-2 rounded-full uppercase tracking-widest ${activeRoom === r ? 'active bg-white/10' : ''}`}>
                            <i data-lucide={ROOM_ICONS[r]} className="w-4 h-4"></i><span>{r}</span>
                        </button>
                    ))}
                    <button onClick={downloadInventory} className="flex items-center gap-2 px-3 py-2 rounded-full text-[10px] font-bold uppercase text-white/40 hover:text-white border border-dashed border-white/20 ml-4 transition-all">
                        <i data-lucide="download" className="w-3 h-3"></i><span>Export</span>
                    </button>
                </nav>

                <div className="flex-container px-2">
                    {Object.keys(grouped).length === 0 ? (
                        <p className="text-white/20 text-[11px] uppercase tracking-widest text-center w-full py-24 italic">Room Inventory Empty</p>
                    ) : (
                        columnedCategories.map((col, i) => (
                            <div key={i} className="column">
                                {col.map(cat => renderBox(cat))}
                            </div>
                        ))
                    )}
                </div>

                <button onClick={() => {setModalRoom(activeRoom === "Shopping List" ? "Fridge" : activeRoom); setIsModalOpen(true)}} className="add-btn fixed bottom-10 right-10 bg-white text-black rounded-full shadow-2xl flex items-center justify-center z-50 active:scale-95 transition-transform">
    <i data-lucide="plus"></i>
</button>

                {isModalOpen && (
                    <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/98 backdrop-blur-md">
                        <div className="bg-[#111] w-full max-w-md p-8 border border-white/10 rounded-3xl shadow-2xl">
                            <div className="flex justify-between items-center mb-10">
                                <p className="handwritten-header !text-white/90 !border-white/20 text-lg">ADD TO PANTRY</p>
                                <button onClick={() => setIsModalOpen(false)} className="p-2 hover:bg-white/5 rounded-full transition-colors">
                                    <i data-lucide="x" className="w-6 h-6 text-white/40 hover:text-white"></i>
                                </button>
                            </div>
                            <form onSubmit={handleAddItem} className="space-y-10">
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-white/40 mb-4">Select Room</p>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                        {Object.keys(ROOM_ICONS).filter(k => k !== "Shopping List").map(r => (
                                            <button type="button" key={r} onClick={() => setModalRoom(r)} className={`px-4 py-2 text-[10px] font-black border transition-all rounded-lg ${modalRoom === r ? 'bg-white text-black border-white' : 'text-white/40 border-white/10 hover:border-white/30'}`}>{r.toUpperCase()}</button>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <p className="text-[10px] font-black uppercase tracking-widest text-white/40 mb-4">Select Category</p>
                                    <div className="flex flex-wrap gap-2">
                                        {Object.keys(CATEGORIES).filter(c => CATEGORIES[c][1].includes(modalRoom)).map(c => (
                                            <button type="button" key={c} onClick={() => setModalCat(c)} className={`px-3 py-2 text-[9px] font-bold border rounded-lg transition-all ${modalCat === c ? 'bg-white/90 text-black border-white' : 'text-white/30 border-white/5 hover:border-white/20'}`}>{c}</button>
                                        ))}
                                    </div>
                                </div>
                                <div className="space-y-4">
                                    <input autoFocus type="text" placeholder="What are we adding?" value={newName} onChange={(e) => handleNameChange(e.target.value)} className="w-full bg-transparent border-b-2 border-white/10 py-3 text-2xl font-light outline-none focus:border-white transition-colors text-white placeholder:text-white/10" />
                                    <div className="flex gap-6 items-end pt-4">
                                        <div className="flex-1">
                                            <p className="text-[10px] font-black uppercase tracking-widest text-white/40 mb-2">Quantity</p>
                                            <input type="text" placeholder="1" value={newQty} onChange={(e) => setNewQty(e.target.value)} className="w-full bg-transparent border-b-2 border-white/10 py-2 outline-none text-white text-xl focus:border-white transition-colors" />
                                        </div>
                                        <button type="submit" className="flex-[2] bg-white h-14 text-black text-[11px] font-black tracking-[0.2em] uppercase rounded-xl hover:bg-gray-200 transition-colors">SAVE ENTRY</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<PantryApp />);
    </script>
</body>
</html>
