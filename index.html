<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Professional</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #1c1917; color: #E7E5E4; min-height: 100vh; overflow-x: hidden; }
        .vines-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.15; }
        .glass-card { background: rgba(41, 37, 36, 0.4); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); transition: all 0.3s ease; }
        .shelf-divider { border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 1rem; padding-bottom: 0.5rem; }
        .category-tag { font-size: 8px; padding: 2px 6px; border-radius: 4px; letter-spacing: 0.1em; font-weight: 800; }
    </style>
</head>
<body class="antialiased font-light tracking-tight uppercase">
    <div class="vines-container">
        <svg style="position:absolute; top:0; left:0; width:300px; height:300px;" viewBox="0 0 100 100"><path d="M0,0 Q30,10 40,50 T90,80" stroke="#4d7c0f" stroke-width="0.3" fill="none" /></svg>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const CATEGORIES = {
            "Produce": "text-green-400 bg-green-400/10",
            "Dairy": "text-blue-300 bg-blue-300/10",
            "Protein": "text-red-400 bg-red-400/10",
            "Pantry": "text-orange-300 bg-orange-300/10",
            "Frozen": "text-cyan-200 bg-cyan-200/10",
            "Misc": "text-stone-500 bg-stone-500/10"
        };

        function PantryApp() {
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [selectedCat, setSelectedCat] = useState("Misc");
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            // Group items by category for the current room
            const groupedItems = useMemo(() => {
                const filtered = items.filter(i => i.room === activeRoom);
                return filtered.reduce((acc, item) => {
                    const cat = item.category || "Misc";
                    if (!acc[cat]) acc[cat] = [];
                    acc[cat].push(item);
                    return acc;
                }, {});
            }, [items, activeRoom]);

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName || isSyncing) return;
                setIsSyncing(true);

                const nameToAdd = newName.trim();
                const qtyToAdd = parseFloat(newQty) || 1;
                
                const existing = items.find(i => i.room === activeRoom && i.name?.toLowerCase() === nameToAdd.toLowerCase());

                try {
                    if (existing) {
                        const newTotal = (parseFloat(existing.qty || 0) + qtyToAdd).toString();
                        await supabase.from('FancyPantry').update({ qty: newTotal }).eq('id', existing.id);
                    } else {
                        // NOTE: Ensure your 'FancyPantry' table has a 'category' column (text)
                        await supabase.from('FancyPantry').insert([{ name: nameToAdd, qty: qtyToAdd.toString(), room: activeRoom, category: selectedCat }]);
                    }
                    await fetchItems();
                } finally {
                    setNewName(""); setNewQty("");
                    setIsSyncing(false);
                }
            };

            const removeItem = async (id) => {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            };

            return (
                <div className="max-w-4xl mx-auto pb-48 px-6 pt-12">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-2xl font-extralight italic tracking-widest text-stone-400">
                            {activeRoom} <span className="text-white">Inventory</span>
                        </h1>
                    </header>

                    <nav className="flex gap-2 overflow-x-auto pb-6 mb-8 no-scrollbar">
                        {["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"].map(room => (
                            <button key={room} onClick={() => setActiveRoom(room)}
                                className={`px-5 py-2 rounded-xl text-[10px] font-bold transition-all ${
                                    activeRoom === room ? "bg-white text-stone-900 shadow-xl" : "bg-stone-900/40 text-stone-600"
                                }`}>
                                {room}
                            </button>
                        ))}
                    </nav>

                    <div className="space-y-10">
                        {Object.keys(CATEGORIES).map(cat => groupedItems[cat] && (
                            <section key={cat} className="animate-in slide-in-from-bottom-4 duration-700">
                                <div className="shelf-divider flex justify-between items-center">
                                    <h2 className="text-[10px] font-black tracking-[0.3em] text-stone-500">{cat}</h2>
                                    <span className="text-[9px] text-stone-700">{groupedItems[cat].length} items</span>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                    {groupedItems[cat].map(item => (
                                        <div key={item.id} className="glass-card p-4 rounded-2xl group flex flex-col justify-between h-24">
                                            <div className="flex justify-between items-start">
                                                <div className="min-w-0">
                                                    <p className="text-[11px] font-semibold text-stone-100 truncate mb-1">{item.name}</p>
                                                    <span className={`category-tag ${CATEGORIES[cat]}`}>{cat}</span>
                                                </div>
                                                <button onClick={() => removeItem(item.id)} className="text-stone-800 hover:text-red-500 transition-colors">
                                                    <i data-lucide="x" className="w-3 h-3"></i>
                                                </button>
                                            </div>
                                            <div className="flex justify-between items-end border-t border-white/5 pt-2 mt-2">
                                                <p className="text-[9px] text-stone-500 font-bold uppercase">Amount</p>
                                                <p className="text-xs text-white font-light">{item.qty}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </div>

                    <div className="fixed bottom-8 left-6 right-6 flex justify-center pointer-events-none">
                        <div className="bg-[#1c1917]/90 backdrop-blur-3xl p-4 w-full max-w-lg pointer-events-auto rounded-[2.5rem] border border-white/5 shadow-2xl">
                            <div className="flex gap-2 overflow-x-auto no-scrollbar mb-3">
                                {Object.keys(CATEGORIES).map(cat => (
                                    <button key={cat} onClick={() => setSelectedCat(cat)}
                                        className={`px-3 py-1 rounded-full text-[8px] font-bold transition-all border ${
                                            selectedCat === cat ? "border-white text-white" : "border-transparent text-stone-600"
                                        }`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                            <form onSubmit={handleAddItem} className="flex items-center gap-2">
                                <input type="text" placeholder="Item Name..." value={newName} onChange={(e) => setNewName(e.target.value)} className="flex-1 bg-transparent px-2 py-2 outline-none text-sm text-white placeholder:text-stone-700" />
                                <input type="text" placeholder="Qty" value={newQty} onChange={(e) => setNewQty(e.target.value)} className="w-12 bg-white/5 rounded-xl py-2 text-center outline-none text-xs text-stone-400" />
                                <button type="submit" disabled={isSyncing} className="bg-white text-stone-900 w-10 h-10 rounded-2xl flex items-center justify-center">
                                    <i data-lucide="plus" className="w-5 h-5"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
