<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Professional</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=DM+Serif+Display&family=Inter:wght@300;400;700;900&display=swap');
        
        body { 
            background-color: #0d0d0c;
            background-image: radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 32px 32px;
            background-attachment: fixed;
            color: #f4f4f5; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
            margin: 0;
        }

        .botanical-art { 
            position: fixed; bottom: 10px; right: 10px; width: 140px; 
            opacity: 0.1; pointer-events: none; filter: invert(1); z-index: 0;
        }

        /* 3-COLUMN GRID LOGIC */
        .flex-container { 
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
            position: relative;
            z-index: 1;
            padding: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (min-width: 768px) { .flex-container { grid-template-columns: 1fr 1fr; } }
        @media (min-width: 1024px) { 
            .flex-container { grid-template-columns: 1fr 1fr 1fr; gap: 1rem; padding: 20px 40px; }
            .note-box { padding: 14px !important; }
            .handwritten { font-size: 0.95rem !important; }
            .handwritten-header { font-size: 1.1rem !important; }
        }

        .note-box { 
            background: rgba(18, 18, 17, 0.95);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            border-radius: 2px;
            height: fit-content;
        }

        .handwritten-header { 
            font-family: 'DM Serif Display', serif; 
            font-size: 1.4rem; 
            letter-spacing: 0.02em; 
            display: flex; align-items: center; gap: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
            margin-bottom: 16px;
        }
        
        .handwritten { 
            font-family: 'Covered By Your Grace', cursive; 
            font-size: 1.3rem; 
            color: #ffffff; 
        }

        /* NAVIGATION */
        .room-nav { display: flex; justify-content: center; align-items: center; gap: 2rem; padding: 30px 10px; flex-wrap: wrap; }
        .room-btn { 
            font-size: 10px; font-weight: 900; letter-spacing: 0.25em; 
            color: #52525b; text-transform: uppercase; transition: 0.3s;
            border-bottom: 2px solid transparent;
        }
        .room-btn.active { color: #fff; border-bottom: 2px solid #fff; }

        /* PULSING ROSE GLOW */
        @keyframes rose-glow {
            0% { color: #fb7185; opacity: 1; }
            50% { color: #4c0519; opacity: 0.5; }
            100% { color: #fb7185; opacity: 1; }
        }
        .out-of-stock-text .handwritten { animation: rose-glow 3s infinite ease-in-out; }

        /* MICRO-EDIT INPUTS */
        .edit-row { display: flex; gap: 4px; width: 100%; background: #000; padding: 4px; border-radius: 4px; }
        input.edit-input { 
            background: transparent; border: none; color: #fff; padding: 2px 6px; 
            font-size: 11px !important; outline: none; flex: 1; min-width: 0;
        }
        .save-btn { background: #fff; color: #000; font-size: 8px; font-weight: 900; padding: 2px 8px; border-radius: 2px; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <svg class="botanical-art" viewBox="0 0 100 100"><path d="M10,90 Q30,70 20,40 T50,20 T90,10" stroke="white" fill="none" stroke-width="0.3"/></svg>
    <div id="root"></div>

    <script type="text/babel">
    const { useState, useEffect, useMemo } = React;
    const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
    const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
    const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

    const CATEGORY_META = {
        "Produce": ["leaf", "#86efac"], "Dairy": ["milk", "#bae6fd"], "Protein": ["bone", "#fca5a5"],
        "Drinks": ["droplets", "#93c5fd"], "Condiments": ["utensils", "#fcd34d"], "Snacks": ["zap", "#fdba74"],
        "Meats & Seafood": ["anchor", "#f87171"], "Prepared Meals": ["box", "#cbd5e1"], "Frozen Veg & Fruit": ["leaf", "#4ade80"],
        "Desserts": ["ice-cream", "#f9a8d4"], "Bakery & Breads": ["wheat", "#fde68a"], "Pasta & Grains": ["shrub", "#d9f99d"],
        "Cereal": ["box-select", "#bfdbfe"], "Cans & Jars": ["container", "#e5e7eb"], "Baking Essentials": ["cookie", "#fbcfe8"],
        "Spreads & Jars": ["cup-soda", "#ddd6fe"], "Sides": ["list-todo", "#a7f3d0"], "Supplies": ["cog", "#d4d4d8"],
        "Dishware": ["utensils-2", "#d4d4d8"], "Misc": ["more-horizontal", "#d4d4d8"]
    };

    function PantryApp() {
        const [activeRoom, setActiveRoom] = useState("Fridge");
        const [items, setItems] = useState([]);
        const [isModalOpen, setIsModalOpen] = useState(false);
        const [editingId, setEditingId] = useState(null);
        const [editValue, setEditValue] = useState("");
        const [editQty, setEditQty] = useState("");
        const [newName, setNewName] = useState("");
        const [newQty, setNewQty] = useState("");

        useEffect(() => { fetchItems(); }, []);
        useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, editingId, isModalOpen]);

        async function fetchItems() {
            const { data } = await supabase.from('FancyPantry').select('*').order('name');
            if (data) setItems(data);
        }

        const handleUpdate = async (id) => {
            await supabase.from('FancyPantry').update({ name: editValue, qty: editQty }).eq('id', id);
            setEditingId(null); fetchItems();
        };

        const grouped = useMemo(() => {
            const target = activeRoom.toLowerCase().replace(/\s/g, '');
            let filtered = items.filter(i => {
                const dbRoom = (i.room || "").toLowerCase().replace(/\s/g, '');
                if (target === "shoppinglist") return parseFloat(i.qty || 0) === 0;
                return dbRoom === target;
            });

            const sorted = [...filtered].sort((a, b) => {
                const aQty = parseFloat(a.qty || 0), bQty = parseFloat(b.qty || 0);
                if (aQty === 0 && bQty > 0) return 1;
                if (aQty > 0 && bQty === 0) return -1;
                return a.name.localeCompare(b.name);
            });

            return sorted.reduce((acc, i) => {
                const cat = i.category || "Misc";
                if (!acc[cat]) acc[cat] = [];
                acc[cat].push(i);
                return acc;
            }, {});
        }, [items, activeRoom]);

        return (
            <div className="pb-40">
                <nav className="room-nav">
                    {["Fridge", "Freezer", "Dry Goods", "Shopping List"].map(r => (
                        <button key={r} onClick={() => setActiveRoom(r)} className={`room-btn ${activeRoom === r ? 'active' : ''}`}>{r}</button>
                    ))}
                </nav>

                <div className="flex-container">
                    {Object.keys(grouped).map(cat => (
                        <div key={cat} className="note-box">
                            <h3 className="handwritten-header" style={{ color: CATEGORY_META[cat]?.[1] || '#fff' }}>
                                <i data-lucide={CATEGORY_META[cat]?.[0] || 'box'} className="w-5 h-5"></i>
                                {cat}
                            </h3>
                            <ul className="space-y-4">
                                {grouped[cat].map(item => (
                                    <li key={item.id} className={parseFloat(item.qty) === 0 && activeRoom !== "Shopping List" ? 'out-of-stock-text' : ''}>
                                        {editingId === item.id ? (
                                            <div className="edit-row">
                                                <input className="edit-input" value={editValue} onChange={e => setEditValue(e.target.value)} autoFocus />
                                                <input className="edit-input !w-10 text-center" value={editQty} onChange={e => setEditQty(e.target.value)} />
                                                <button onClick={() => handleUpdate(item.id)} className="save-btn">SAVE</button>
                                            </div>
                                        ) : (
                                            <div className="flex justify-between items-center cursor-pointer group" onClick={() => { setEditingId(item.id); setEditValue(item.name); setEditQty(item.qty); }}>
                                                <span className="handwritten capitalize">{item.name}</span>
                                                <div className="flex items-center gap-3">
                                                    <span className="text-[9px] font-black opacity-30">x{item.qty}</span>
                                                    <button onClick={(e) => { e.stopPropagation(); if(confirm("Delete?")) supabase.from('FancyPantry').delete().eq('id', item.id).then(fetchItems); }} className="opacity-0 group-hover:opacity-100 text-red-500 text-[12px]">×</button>
                                                </div>
                                            </div>
                                        )}
                                    </li>
                                ))}
                            </ul>
                        </div>
                    ))}
                </div>

                <button onClick={() => setIsModalOpen(true)} className="fixed bottom-10 right-10 w-12 h-12 bg-white text-black rounded-full shadow-2xl flex items-center justify-center z-[100] active:scale-90 transition-transform"><i data-lucide="plus" className="w-6 h-6"></i></button>

                {isModalOpen && (
                    <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-black/95 backdrop-blur-md">
                        <div className="bg-[#111] w-full max-w-sm p-10 border border-white/10 rounded-lg shadow-2xl">
                            <form onSubmit={async e => {
                                e.preventDefault();
                                await supabase.from('FancyPantry').insert([{ name: newName, qty: newQty || "1", room: activeRoom, category: "Misc" }]);
                                setIsModalOpen(false); setNewName(""); fetchItems();
                            }} className="space-y-8">
                                <h2 className="handwritten-header !text-white/30">New Entry</h2>
                                <input className="w-full bg-transparent border-b border-white/10 py-4 text-xl outline-none focus:border-white transition-colors text-white" placeholder="Name..." value={newName} onChange={e => setNewName(e.target.value)} autoFocus />
                                <div className="flex gap-4">
                                    <input className="w-20 bg-transparent border-b border-white/10 py-4 text-lg outline-none" placeholder="Qty" value={newQty} onChange={e => setNewQty(e.target.value)} />
                                    <button type="submit" className="flex-1 bg-white text-black font-black uppercase tracking-widest h-14 rounded text-[10px]">Save</button>
                                </div>
                                <button type="button" onClick={() => setIsModalOpen(false)} className="w-full text-[8px] opacity-40 uppercase tracking-widest">Nevermind</button>
                            </form>
                        </div>
                    </div>
                )}
            </div>
        );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<PantryApp />);
    </script>
</body>
</html>
