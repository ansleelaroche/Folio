<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Smart</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #1c1917; color: #E7E5E4; min-height: 100vh; overflow-x: hidden; }
        .vines-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.15; }
        .glass-card { background: rgba(41, 37, 36, 0.4); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .shelf-divider { border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 0.75rem; padding-bottom: 0.25rem; }
    </style>
</head>
<body class="antialiased font-light tracking-tight uppercase">
    <div class="vines-container">
        <svg style="position:absolute; top:0; left:0; width:300px; height:300px;" viewBox="0 0 100 100"><path d="M0,0 Q30,10 40,50 T90,80" stroke="#4d7c0f" stroke-width="0.3" fill="none" /></svg>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const CATEGORIES = {
            "Produce": { color: "text-green-400", keywords: ["apple", "banana", "lettuce", "onion", "carrot", "broccoli", "spinach", "fruit", "veg", "tomato", "potato", "garlic", "lemon", "lime", "berry", "cucumber"] },
            "Dairy": { color: "text-blue-300", keywords: ["milk", "cheese", "yogurt", "butter", "egg", "cream", "sour", "brie", "cheddar", "parm", "dairy"] },
            "Protein": { color: "text-red-400", keywords: ["chicken", "beef", "pork", "fish", "tofu", "steak", "bacon", "salmon", "shrimp", "turkey", "ham", "meat", "protein"] },
            "Drinks": { color: "text-purple-300", keywords: ["water", "soda", "juice", "coke", "wine", "beer", "drink", "beverage", "sparkling", "pop"] },
            "Pantry": { color: "text-orange-300", keywords: ["flour", "sugar", "pasta", "rice", "oil", "can", "soup", "bread", "cereal", "snack", "chip", "coffee", "tea", "spice", "sauce"] },
            "Frozen": { color: "text-cyan-200", keywords: ["ice", "frozen", "pizza", "nugget"] },
            "Misc": { color: "text-stone-500", keywords: [] }
        };

        function PantryApp() {
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [selectedCat, setSelectedCat] = useState("Misc");
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom]);

            // Auto-categorize based on typing
            useEffect(() => {
                const name = newName.toLowerCase();
                for (const [cat, data] of Object.entries(CATEGORIES)) {
                    if (data.keywords.some(k => name.includes(k))) {
                        setSelectedCat(cat);
                        return;
                    }
                }
            }, [newName]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            const groupedItems = useMemo(() => {
                const filtered = items.filter(i => i.room === activeRoom);
                return filtered.reduce((acc, item) => {
                    // Match category case-insensitively
                    const dbCat = (item.category || "Misc").toLowerCase();
                    const matchedCat = Object.keys(CATEGORIES).find(k => k.toLowerCase() === dbCat) || "Misc";
                    
                    if (!acc[matchedCat]) acc[matchedCat] = [];
                    acc[matchedCat].push(item);
                    return acc;
                }, {});
            }, [items, activeRoom]);

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName || isSyncing) return;
                setIsSyncing(true);

                const nameToAdd = newName.trim();
                const qtyToAdd = parseFloat(newQty) || 1;
                const existing = items.find(i => i.room === activeRoom && i.name?.toLowerCase() === nameToAdd.toLowerCase());

                try {
                    if (existing) {
                        const newTotal = (parseFloat(existing.qty || 0) + qtyToAdd).toString();
                        await supabase.from('FancyPantry').update({ qty: newTotal }).eq('id', existing.id);
                    } else {
                        await supabase.from('FancyPantry').insert([{ 
                            name: nameToAdd, 
                            qty: qtyToAdd.toString(), 
                            room: activeRoom, 
                            category: selectedCat 
                        }]);
                    }
                    await fetchItems();
                } finally {
                    setNewName(""); setNewQty(""); setSelectedCat("Misc");
                    setIsSyncing(false);
                }
            };

            const removeItem = async (id) => {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            };

            return (
                <div className="max-w-4xl mx-auto pb-48 px-6 pt-12">
                    <header className="mb-8">
                        <h1 className="text-xl font-extralight italic tracking-[0.2em] text-stone-500">{activeRoom} <span className="text-white">Inventory</span></h1>
                    </header>

                    <nav className="flex gap-2 overflow-x-auto pb-6 mb-6 no-scrollbar border-b border-white/5">
                        {["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"].map(room => (
                            <button key={room} onClick={() => setActiveRoom(room)}
                                className={`px-4 py-2 rounded-lg text-[9px] font-bold transition-all ${
                                    activeRoom === room ? "bg-white text-stone-900" : "bg-stone-900/40 text-stone-600"
                                }`}>
                                {room}
                            </button>
                        ))}
                    </nav>

                    <div className="space-y-8">
                        {Object.keys(CATEGORIES).map(cat => groupedItems[cat] && (
                            <section key={cat} className="animate-in fade-in slide-in-from-bottom-2 duration-500">
                                <div className="shelf-divider flex justify-between items-baseline">
                                    <h2 className={`text-[9px] font-black tracking-[0.3em] ${CATEGORIES[cat].color}`}>{cat}</h2>
                                    <span className="text-[8px] text-stone-700">{groupedItems[cat].length}</span>
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-2">
                                    {groupedItems[cat].map(item => (
                                        <div key={item.id} className="glass-card p-3 rounded-xl flex justify-between items-center group">
                                            <div className="min-w-0">
                                                <p className="text-[10px] font-medium text-stone-200 truncate">{item.name}</p>
                                                <p className="text-[8px] text-stone-600 font-bold">QTY: {item.qty}</p>
                                            </div>
                                            <button onClick={() => removeItem(item.id)} className="text-stone-800 hover:text-red-500 transition-colors">
                                                <i data-lucide="x" className="w-3 h-3"></i>
                                            </button>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}
                    </div>

                    <div className="fixed bottom-6 left-6 right-6 flex justify-center pointer-events-none">
                        <div className="bg-[#1c1917]/95 backdrop-blur-2xl p-4 w-full max-w-lg pointer-events-auto rounded-[2rem] border border-white/5 shadow-2xl">
                            <div className="flex gap-2 mb-3 overflow-x-auto no-scrollbar">
                                {Object.keys(CATEGORIES).map(cat => (
                                    <button key={cat} onClick={() => setSelectedCat(cat)}
                                        className={`px-3 py-1 rounded-full text-[8px] font-bold transition-all border ${
                                            selectedCat === cat ? "bg-white text-black border-white" : "bg-stone-900/50 text-stone-600 border-transparent"
                                        }`}>
                                        {cat}
                                    </button>
                                ))}
                            </div>
                            <form onSubmit={handleAddItem} className="flex items-center gap-2">
                                <input type="text" placeholder="Add Item..." value={newName} onChange={(e) => setNewName(e.target.value)} 
                                    className="flex-1 bg-transparent px-2 py-1 outline-none text-sm text-white placeholder:text-stone-800" />
                                <input type="text" placeholder="1" value={newQty} onChange={(e) => setNewQty(e.target.value)} 
                                    className="w-10 bg-white/5 rounded-lg py-2 text-center outline-none text-xs text-stone-400" />
                                <button type="submit" disabled={isSyncing} className="bg-white text-stone-900 w-10 h-10 rounded-xl flex items-center justify-center active:scale-95 transition-transform">
                                    <i data-lucide="plus" className="w-5 h-5"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
