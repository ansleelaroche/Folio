<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Mini</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap');
        
        body { 
            background-color: #0f0e0d; 
            color: #d4d4d8; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        .botanical-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.05;
            background-image: url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .sidebar {
            background: #161616;
            border-right: 1px solid #262626;
        }

        .mini-card {
            background: #1c1c1c;
            border: 1px solid #2d2d2d;
            transition: all 0.15s ease;
        }
        
        .mini-card:hover {
            border-color: #444;
            background: #222;
        }

        .active-tab {
            background: #262626;
            color: #fff;
            border-left: 2px solid #525252;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased tracking-tighter uppercase text-[10px] font-bold">
    <div class="botanical-overlay"></div>
    <div id="root" class="relative z-10"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const ROOMS = ["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"];
        const CAT_CONFIG = {
            "Produce": "leaf", "Dairy": "milk", "Protein": "bone", "Drinks": "droplets",
            "Condiments": "utensils", "Meats & Seafood": "anchor", "Prepared Meals": "box",
            "Bakery": "wheat", "Baking": "cookie", "Spreads": "container", "Dishware": "utensils-2", "Misc": "archive"
        };

        function PantryApp() {
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalRoom, setModalRoom] = useState("Fridge");
            const [modalCat, setModalCat] = useState("Misc");
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, isModalOpen]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName || isSyncing) return;
                setIsSyncing(true);
                const existing = items.find(i => i.room === modalRoom && i.name?.toLowerCase() === newName.trim().toLowerCase());
                try {
                    if (existing) {
                        const nextQty = (parseFloat(existing.qty || 0) + (parseFloat(newQty) || 1)).toString();
                        await supabase.from('FancyPantry').update({ qty: nextQty }).eq('id', existing.id);
                    } else {
                        await supabase.from('FancyPantry').insert([{ name: newName.trim(), qty: newQty || "1", room: modalRoom, category: modalCat }]);
                    }
                    await fetchItems();
                    setNewName(""); setNewQty("");
                } finally { setIsSyncing(false); }
            };

            const grouped = useMemo(() => {
                const roomItems = items.filter(i => i.room === activeRoom);
                return roomItems.reduce((acc, i) => {
                    const c = i.category || "Misc";
                    if (!acc[c]) acc[c] = [];
                    acc[c].push(i);
                    return acc;
                }, {});
            }, [items, activeRoom]);

            return (
                <div className="flex h-screen w-full">
                    {/* SLIM SIDEBAR */}
                    <aside className="w-16 md:w-48 sidebar flex flex-col pt-8">
                        <div className="px-4 mb-8 hidden md:block">
                            <h1 className="tracking-[0.3em] text-stone-500">PANTRY</h1>
                        </div>
                        <nav className="flex-1 space-y-1">
                            {ROOMS.map(r => (
                                <button key={r} onClick={() => setActiveRoom(r)} className={`w-full py-3 px-4 text-left transition-all ${activeRoom === r ? 'active-tab' : 'text-stone-600'}`}>
                                    <span className="hidden md:inline">{r}</span>
                                    <span className="md:hidden text-[8px]">{r[0]}</span>
                                </button>
                            ))}
                        </nav>
                        <button onClick={() => {setModalRoom(activeRoom); setIsModalOpen(true)}} className="p-4 bg-stone-100 text-black m-2 rounded hover:bg-white">+</button>
                    </aside>

                    {/* MICRO CONTENT */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-10 no-scrollbar">
                        <div className="max-w-4xl mx-auto">
                            <header className="mb-8 border-b border-white/5 pb-4 flex justify-between items-end">
                                <h2 className="text-2xl font-black tracking-widest text-white">{activeRoom}</h2>
                                <span className="text-stone-700">{items.filter(i => i.room === activeRoom).length} ITEMS</span>
                            </header>

                            <div className="space-y-8">
                                {Object.keys(grouped).map(cat => (
                                    <section key={cat}>
                                        <div className="flex items-center gap-2 mb-3 text-stone-600 opacity-50">
                                            <i data-lucide={CAT_CONFIG[cat] || 'dot'} className="w-3 h-3"></i>
                                            <h3 className="tracking-[0.4em]">{cat}</h3>
                                        </div>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-2">
                                            {grouped[cat].map(item => (
                                                <div key={item.id} className="mini-card p-2 px-3 rounded flex justify-between items-center group">
                                                    <div className="min-w-0">
                                                        <p className="truncate text-stone-300 font-medium">{item.name}</p>
                                                        <p className="text-[8px] text-stone-700">Q: {item.qty}</p>
                                                    </div>
                                                    <button onClick={() => removeItem(item.id)} className="opacity-0 group-hover:opacity-100 text-stone-800 hover:text-white">×</button>
                                                </div>
                                            ))}
                                        </div>
                                    </section>
                                ))}
                            </div>
                        </div>
                    </main>

                    {/* COMPACT MODAL */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90">
                            <div className="bg-[#111] w-full max-w-sm rounded p-6 border border-white/10">
                                <div className="flex justify-between items-center mb-6">
                                    <p className="tracking-widest text-stone-600">NEW ENTRY</p>
                                    <button onClick={() => setIsModalOpen(false)}>×</button>
                                </div>
                                <div className="space-y-4">
                                    <div className="flex gap-1 overflow-x-auto no-scrollbar">
                                        {ROOMS.map(r => (
                                            <button key={r} onClick={() => setModalRoom(r)} className={`px-2 py-1 rounded text-[8px] border ${modalRoom === r ? 'bg-white text-black' : 'border-white/5 text-stone-600'}`}>{r}</button>
                                        ))}
                                    </div>
                                    <div className="flex gap-1 overflow-x-auto no-scrollbar">
                                        {Object.keys(CAT_CONFIG).map(c => (
                                            <button key={c} onClick={() => setModalCat(c)} className={`px-2 py-1 rounded text-[8px] border ${modalCat === c ? 'bg-white text-black' : 'border-white/5 text-stone-600'}`}>{c}</button>
                                        ))}
                                    </div>
                                    <form onSubmit={handleAddItem} className="space-y-4 pt-4 border-t border-white/5">
                                        <input autoFocus type="text" placeholder="NAME" value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full bg-white/5 p-3 outline-none border border-white/5" />
                                        <div className="flex gap-2">
                                            <input type="text" placeholder="QTY" value={newQty} onChange={(e) => setNewQty(e.target.value)} className="w-20 bg-white/5 p-3 outline-none border border-white/5" />
                                            <button type="submit" className="flex-1 bg-stone-100 text-black font-black tracking-widest">{isSyncing ? '...' : 'ADD'}</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
