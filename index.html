<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry Notes</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Inter:wght@300;600&display=swap');
        
        body { 
            background-color: #0d0d0c; 
            color: #d4d4d8; 
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .botanical-art {
            position: fixed;
            bottom: -5%;
            right: -5%;
            width: 400px;
            opacity: 0.15;
            pointer-events: none;
            filter: invert(1);
        }

        /* The "Post-It" Note Style */
        .note-box {
            background: #1a1918;
            border: 1px solid #2a2928;
            box-shadow: 8px 8px 0px rgba(0,0,0,0.2);
            padding: 20px;
            height: fit-content;
        }

        .handwritten {
            font-family: 'Covered By Your Grace', cursive;
            font-size: 1.4rem;
            letter-spacing: 0.05em;
            color: #a1a1aa;
        }

        .room-btn {
            letter-spacing: 0.3em;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
        }

        .room-btn.active {
            color: #fff;
            border-bottom: 2px solid #525252;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="antialiased p-6 md:p-12">
    <svg class="botanical-art" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M10,90 Q30,70 20,40 T50,20 T90,10" stroke="white" fill="none" stroke-width="0.5"/>
        <path d="M15,85 Q35,65 25,35" stroke="white" fill="none" stroke-width="0.3"/>
        <circle cx="50" cy="20" r="1" fill="white"/>
    </svg>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const ROOMS = ["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"];
        const CAT_ICONS = {
            "Produce": "leaf", "Dairy": "milk", "Protein": "bone", "Drinks": "droplets",
            "Condiments": "utensils", "Bakery": "wheat", "Baking": "cookie", "Dishware": "utensils-2", "Misc": "archive"
        };

        function PantryApp() {
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalRoom, setModalRoom] = useState("Fridge");
            const [modalCat, setModalCat] = useState("Misc");
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom, isModalOpen]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName || isSyncing) return;
                setIsSyncing(true);
                try {
                    const existing = items.find(i => i.room === modalRoom && i.name?.toLowerCase() === newName.trim().toLowerCase());
                    if (existing) {
                        const nextQty = (parseFloat(existing.qty || 0) + (parseFloat(newQty) || 1)).toString();
                        await supabase.from('FancyPantry').update({ qty: nextQty }).eq('id', existing.id);
                    } else {
                        await supabase.from('FancyPantry').insert([{ name: newName.trim(), qty: newQty || "1", room: modalRoom, category: modalCat }]);
                    }
                    await fetchItems();
                    setNewName(""); setNewQty("");
                } finally { setIsSyncing(false); }
            };

            const removeItem = async (id) => {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            };

            const grouped = useMemo(() => {
                const roomItems = items.filter(i => i.room === activeRoom);
                return roomItems.reduce((acc, i) => {
                    const c = i.category || "Misc";
                    if (!acc[c]) acc[c] = [];
                    acc[c].push(i);
                    return acc;
                }, {});
            }, [items, activeRoom]);

            return (
                <div className="max-w-6xl mx-auto">
                    {/* Header Nav */}
                    <nav className="flex justify-center gap-6 md:gap-12 mb-16 overflow-x-auto no-scrollbar pb-4">
                        {ROOMS.map(r => (
                            <button key={r} onClick={() => setActiveRoom(r)} 
                                className={`room-btn text-[10px] font-black uppercase py-2 ${activeRoom === r ? 'active' : 'text-stone-700'}`}>
                                {r}
                            </button>
                        ))}
                    </nav>

                    <header className="mb-12 flex justify-between items-baseline border-b border-white/5 pb-4">
                        <h1 className="text-4xl font-light italic tracking-tighter text-stone-300">{activeRoom}</h1>
                        <span className="text-[10px] font-bold text-stone-800 uppercase tracking-[0.2em]">Inventory Log</span>
                    </header>

                    {/* Masonry Post-It Layout */}
                    <div className="columns-1 md:columns-2 lg:columns-3 gap-6 space-y-6">
                        {Object.keys(grouped).map(cat => (
                            <div key={cat} className="note-box break-inside-avoid">
                                <div className="flex items-center gap-3 mb-6 opacity-30">
                                    <i data-lucide={CAT_ICONS[cat] || 'dot'} className="w-3 h-3 text-white"></i>
                                    <h3 className="text-[9px] font-black tracking-[0.4em] uppercase">{cat}</h3>
                                </div>
                                <ul className="space-y-4">
                                    {grouped[cat].map(item => (
                                        <li key={item.id} className="flex justify-between items-baseline group border-b border-white/5 pb-2">
                                            <span className="handwritten lowercase">{item.name}</span>
                                            <div className="flex items-center gap-4">
                                                <span className="text-[10px] font-bold text-stone-700 italic">x{item.qty}</span>
                                                <button onClick={() => removeItem(item.id)} className="opacity-0 group-hover:opacity-100 text-stone-800 hover:text-red-900 text-xs">×</button>
                                            </div>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                        ))}
                    </div>

                    {/* FAB */}
                    <button onClick={() => {setModalRoom(activeRoom); setIsModalOpen(true)}} 
                        className="fixed bottom-10 right-10 w-14 h-14 bg-stone-200 text-black rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50">
                        <i data-lucide="plus" className="w-6 h-6"></i>
                    </button>

                    {/* Entry Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-[60] flex items-center justify-center p-6 bg-black/95 backdrop-blur-sm">
                            <div className="bg-[#141413] w-full max-w-md p-10 border border-white/5 shadow-2xl">
                                <div className="flex justify-between items-center mb-10">
                                    <p className="text-[10px] font-black tracking-[0.4em] text-stone-700 uppercase">New Entry</p>
                                    <button onClick={() => setIsModalOpen(false)} className="text-stone-700 hover:text-white"><i data-lucide="x" className="w-6 h-6"></i></button>
                                </div>
                                <form onSubmit={handleAddItem} className="space-y-8">
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                        {ROOMS.map(r => (
                                            <button type="button" key={r} onClick={() => setModalRoom(r)} className={`px-3 py-2 text-[9px] font-bold border transition-all ${modalRoom === r ? 'bg-white text-black border-white' : 'bg-transparent text-stone-800 border-white/5'}`}>{r}</button>
                                        ))}
                                    </div>
                                    <input autoFocus type="text" placeholder="Item..." value={newName} onChange={(e) => setNewName(e.target.value)} className="w-full bg-transparent border-b border-white/10 py-4 text-2xl font-light outline-none text-stone-200" />
                                    <div className="flex gap-4 items-end">
                                        <input type="text" placeholder="Qty" value={newQty} onChange={(e) => setNewQty(e.target.value)} className="w-20 bg-transparent border-b border-white/10 py-2 outline-none text-stone-500" />
                                        <button type="submit" className="flex-1 bg-stone-200 py-4 text-black text-[10px] font-black tracking-widest uppercase">Add to List</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
