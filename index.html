<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>FancyPantry</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        body { background-color: #1c1917; color: #E7E5E4; min-height: 100vh; overflow-x: hidden; position: relative; }
        
        /* Fixed the vines so they sit BEHIND everything and don't block clicks */
        .vines-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.2;
        }

        .glass-card { 
            background: rgba(41, 37, 36, 0.6); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.05); 
        }
        
        .glass-dock { 
            background: rgba(28, 25, 23, 0.95); 
            backdrop-filter: blur(24px); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
        }
    </style>
</head>
<body class="antialiased font-light tracking-tight uppercase">
    
    <div class="vines-container">
        <svg style="position:absolute; top:0; left:0; width:300px; height:300px;" viewBox="0 0 100 100">
            <path d="M0,0 Q30,10 40,50 T90,80" stroke="#4d7c0f" stroke-width="0.5" fill="none" />
            <circle cx="40" cy="50" r="1" fill="#4d7c0f" />
            <circle cx="20" cy="15" r="1.5" fill="#4d7c0f" opacity="0.5" />
        </svg>
        <svg style="position:absolute; bottom:0; right:0; width:350px; height:350px; transform: scale(-1);" viewBox="0 0 100 100">
            <path d="M0,0 Q30,10 40,50 T90,80" stroke="#4d7c0f" stroke-width="0.5" fill="none" />
        </svg>
    </div>

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabaseUrl = 'https://jqvuqfqedzlegxuvudag.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpxdnVxZnFlZHpsZWd4dXZ1ZGFnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUzOTk3NDQsImV4cCI6MjA5MDk3NTc0NH0.kj2jjfHxZNLr6EHQgRrEJMYJpsqM5Nefi-51Lb1mqWw'; 
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        function PantryApp() {
            const [activeRoom, setActiveRoom] = useState("Fridge");
            const [items, setItems] = useState([]);
            const [newName, setNewName] = useState("");
            const [newQty, setNewQty] = useState("");
            const [isSyncing, setIsSyncing] = useState(false);

            useEffect(() => { fetchItems(); }, []);
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [items, activeRoom]);

            async function fetchItems() {
                const { data } = await supabase.from('FancyPantry').select('*').order('name');
                if (data) setItems(data);
            }

            const handleAddItem = async (e) => {
                e.preventDefault();
                if (!newName || isSyncing) return;
                setIsSyncing(true);

                const nameToAdd = newName.trim();
                const qtyToAdd = parseFloat(newQty) || 1;
                
                const existing = items.find(i => 
                    i && i.room === activeRoom && 
                    i.name && i.name.toLowerCase() === nameToAdd.toLowerCase()
                );

                try {
                    if (existing) {
                        const newTotal = (parseFloat(existing.qty || 0) + qtyToAdd).toString();
                        // Explicitly update by ID
                        await supabase.from('FancyPantry').update({ qty: newTotal }).eq('id', existing.id);
                    } else {
                        await supabase.from('FancyPantry').insert([{ name: nameToAdd, qty: qtyToAdd.toString(), room: activeRoom }]);
                    }
                    await fetchItems();
                } catch (err) {
                    console.error(err);
                } finally {
                    setNewName(""); setNewQty("");
                    setIsSyncing(false);
                }
            };

            const removeItem = async (id) => {
                await supabase.from('FancyPantry').delete().eq('id', id);
                setItems(prev => prev.filter(i => i.id !== id));
            };

            const filteredItems = items.filter(item => item && item.room === activeRoom);

            return (
                <div className="max-w-4xl mx-auto pb-40 px-6 pt-12">
                    <header className="flex justify-between items-center mb-10">
                        <h1 className="text-2xl font-extralight italic tracking-widest">FancyPantry</h1>
                        <div className={`transition-opacity ${isSyncing ? 'opacity-100' : 'opacity-20'}`}>
                            <i data-lucide="refresh-cw" className={`w-4 h-4 ${isSyncing ? 'animate-spin' : ''}`}></i>
                        </div>
                    </header>

                    <nav className="flex gap-2 overflow-x-auto pb-6 mb-8 no-scrollbar border-b border-white/5">
                        {["Fridge", "Freezer", "Pantry", "Counter", "Cabinets"].map(room => (
                            <button key={room} onClick={() => setActiveRoom(room)}
                                className={`px-5 py-2 rounded-xl text-[10px] font-bold transition-all whitespace-nowrap ${
                                    activeRoom === room ? "bg-white text-stone-900 shadow-lg" : "bg-stone-900/40 text-stone-500"
                                }`}>
                                {room}
                            </button>
                        ))}
                    </nav>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                        {filteredItems.map(item => (
                            <div key={item.id} className="glass-card px-4 py-3 rounded-2xl flex justify-between items-center group animate-in fade-in duration-500">
                                <div className="flex-1 min-w-0 mr-2">
                                    <p className="text-[11px] font-medium text-stone-200 truncate leading-tight">{item.name}</p>
                                    <p className="text-[9px] text-stone-500 font-bold mt-1">QTY: {item.qty}</p>
                                </div>
                                <button onClick={() => removeItem(item.id)} className="text-stone-700 hover:text-red-500 transition-colors">
                                    <i data-lucide="x" className="w-3 h-3"></i>
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-8 left-6 right-6 flex justify-center pointer-events-none">
                        <div className="glass-dock p-2 w-full max-w-lg pointer-events-auto rounded-[2rem] shadow-2xl">
                            <form onSubmit={handleAddItem} className="flex items-center gap-2">
                                <input type="text" placeholder={activeRoom} value={newName} 
                                    onChange={(e) => setNewName(e.target.value)} 
                                    className="flex-1 bg-transparent px-4 py-3 outline-none text-sm text-white placeholder:text-stone-700 uppercase" 
                                />
                                <input type="text" inputMode="decimal" placeholder="QTY" value={newQty} 
                                    onChange={(e) => setNewQty(e.target.value)} 
                                    className="w-16 bg-white/5 rounded-xl py-3 text-center outline-none text-xs font-bold text-stone-400" 
                                />
                                <button type="submit" disabled={isSyncing} 
                                    className="bg-white text-stone-900 w-12 h-12 rounded-2xl flex items-center justify-center hover:bg-stone-200 active:scale-95 transition-all">
                                    <i data-lucide="plus" className="w-5 h-5"></i>
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<PantryApp />);
    </script>
</body>
</html>
